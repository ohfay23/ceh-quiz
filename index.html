const QUESTIONS=[{"id":8,"section":"SQL injection","question":"Which of the following SQL injection attack does an attacker usually bypassing user authentication and extract data by using a conditional OR clause so that the condition of the WHERE clause will always be true?","options":["Error-Based SQLi","End-of-Line Comment","UNION SQLi","Tautology"],"answer":"D"},{"id":47,"section":"SQL injection","question":"Ethical hacker Jane Smith is attempting to perform an SQL injection attack. She wants to test the response time of a true or false response and wants to use a second command to determine whether the database will return true or false results for user IDs.\nWhich two SQL injection types would give her the results she is looking for?","options":["Out of band and boolean-based","Union-based and error-based","Time-based and union-based","Time-based and boolean-based"],"answer":"D"},{"id":88,"section":"SQL injection","question":"SQL injection (SQLi) attacks attempt to inject SQL syntax into web requests, which may bypass authentication and allow attackers to access and/or modify data attached to a web application.\nWhich of the following SQLi types leverages a database server‵s ability to make DNS requests to pass data to an attacker?","options":["In-band SQLi","Union-based SQLi","Out-of-band SQLi","Time-based blind SQLi"],"answer":"C"},{"id":231,"section":"SQL injection","question":"While performing a security audit of a web application, an ethical hacker discovers a potential vulnerability. The application responds to logically incorrect queries with detailed error messages that divulge the underlying database's structure. The ethical hacker decides to exploit this vulnerability further. Which type of SQL Injection attack is the ethical hacker likely to use?","options":["UNION SQL Injection","Error-based SQL Injection","In-band SQL Injection","Blind/Inferential SQL Injection"],"answer":"B"},{"id":275,"section":"SQL injection","question":"This type of injection attack does not show any error message. It is difficult to exploit as it returns information when the application is given SQL payloads that elicit a true or false response from the server. By observing the response, an attacker can extract sensitive information.\nWhat type of attack is this?","options":["Union SQL injection","Error-based SQL injection","Time-based SQL injection","Blind SQL injection"],"answer":"D"},{"id":278,"section":"SQL injection","question":"Which of the following types of SQL injection attacks extends the results returned by the original query, enabling attackers to run two or more statements if they have the same structure as the original one?","options":["Union SQL injection","Error-based injection","Blind SQL injection","Boolean-based blind SQL injection"],"answer":"A"},{"id":11,"section":"SQL injection","question":"CyberTech Inc. recently experienced SQL injection attacks on its official website. The company appointed Bob, a security professional, to build and incorporate defensive strategies against such attacks. Bob adopted a practice whereby only a list of entities such as the data type, range, size, and value, which have been approved for secured access, is accepted. What is the defensive technique employed by Bob in the above scenario?","options":["Whitelist validation","Output encoding","Blacklist validation","Enforce least privileges"],"answer":"A"},{"id":37,"section":"SQL injection","question":"What is the following command used for?","options":["Retrieving SQL statements being executed on the database","Creating backdoors using SQL injection","Enumerating the databases in the DBMS for the URL","Searching database statements at the IP address given"],"answer":"C"},{"id":87,"section":"SQL injection","question":"Daniel is a professional hacker who is attempting to perform an SQL injection attack on a target website, www.moviescope.com. During this process, he encountered an IDS that detects SQL injection attempts based on predefined signatures. To evade any comparison statement, he attempted placing characters such as “’or ‘1’=‘1’” in any basic injection statement such as “or\n1=1.”\nIdentify the evasion technique used by Daniel in the above scenario.","options":["Char encoding","IP fragmentation","Variation","Null byte"],"answer":"C"},{"id":135,"section":"SQL injection","question":"**QUESTION #135\nAs a cybersecurity professional, you are responsible for securing a high-traffic web application that uses MySQL as its backend database. Recently, there has been a surge of unauthorized login attempts, and you suspect that a seasoned black-hat hacker is behind them. This hacker has shown proficiency in SQL Injection and appears to be using the 'UNION' SQL keyword to trick the login process into returning additional data. However, your application‵s security measures include filtering special characters in user inputs, a method usually effective against such attacks. In this challenging environment, if the hacker still intends to exploit this SQL Injection vulnerability, which strategy is he most likely to employ?","options":["The hacker tries to manipulate the 'UNION' keyword in such a way that it triggers a database error, potentially revealing valuable information about the database's structure.","The hacker switches tactics and resorts to a 'time-based blind' SQL Injection attack, which would force the application to delay its response, thereby revealing information based on the duration of the delay.","The hacker attempts to bypass the special character filter by encoding his malicious input, which could potentially enable him to successfully inject damaging SQL queries.","The hacker alters his approach and injects a DROP TABLE' statement, a move that could potentially lead to the loss of vital data stored in the application's database."],"answer":"C"},{"id":197,"section":"SQL injection","question":"An ethical hacker is hired to evaluate the defenses of an organization's database system which is known to employ a signature-based IDS. The hacker knows that some SQL Injection evasion techniques may allow him to bypass the system's signatures. During the operation, he successfully retrieved a list of usernames from the database without triggering an alarm by employing an advanced evasion technique. Which of the following could he have used?","options":["Utilizing the char encoding function to convert hexadecimal and decimal values into characters that pass-through SQL engine parsing","Implementing sophisticated matches such as \"OR john' = 'john'\" in place of classical matches like \"OR 1=1\"","Manipulating white spaces in SQL queries to bypass signature detection","Using the URL encoding method to replace characters with their ASCII codes in hexadecimal form"],"answer":"A"},{"id":218,"section":"SQL injection","question":"An ethical hacker is testing the security of a website's database system against SQL Injection attacks. They discover that the IDS has a strong signature detection mechanism to detect typical SQL injection patterns. Which evasion technique can be most effectively used to bypass the IDS signature detection while performing a SQL Injection attack?","options":["Employ IP fragmentation to obscure the attack payload","Implement case variation by altering the case of SQL statements","Leverage string concatenation to break identifiable keywords","Use Hex encoding to represent the SQL query string"],"answer":"D"},{"id":136,"section":"SQL injection","question":"You're the security manager for a tech company that uses a database to store sensitive customer data. You have implemented countermeasures against SQL injection attacks. Recently, you noticed some suspicious activities and suspect an attacker is using SQL injection techniques. The attacker is believed to use different forms of payloads in his SQL queries. In the case of a successful SQL injection attack, which of the following payloads would have the most significant impact?","options":["UNION SELECT NULL, NULL, NULL -- : This payload manipulates the UNIONSQL operator, enabling the attacker to retrieve data from different database tables","' OR username LIKE '%': This payload uses the LIKE operator to search for a specific pattern in a column","' OR '1'='l: This payload manipulates the WHERE clause of an SQL statement, allowing the attacker to view unauthorized data","' OR 'a'='a; DROP TABLE members; --: This payload combines the manipulation of the WHERE clause with a destructive action, causing data loss"],"answer":"D"},{"id":182,"section":"SQL injection","question":"During an attempt to perform an SQL injection attack, a certified ethical hacker is focusing on the identification of database engine type by generating an ODBC error. The ethical hacker, after injecting various payloads, finds that the web application returns a standard, generic error message that does not reveal any detailed database information. Which of the following techniques would the hacker consider next to obtain useful information about the underlying database?","options":["Utilize a blind injection technique that uses time delays or error signatures to extract information","Try to insert a string value where a number is expected in the input field","Attempt to compromise the system through OS-level command shell execution","Use the UNION operator to combine the result sets of two or more SELECT statements"],"answer":"A"},{"id":238,"section":"SQL injection","question":"As an IT Security Analyst, you've been asked to review the security measures of an e-commerce website that relies on a SQL database for storing sensitive customer data. Recently, an anonymous tip has alerted you to a possible threat: a seasoned hacker who specializes in SQL Injection attacks may be targeting your system. The site already employs input validation measures to prevent basic injection attacks, and it blocks any user inputs containing suspicious patterns. However, this hacker is known to use advanced SQL Injection techniques. Given this situation, which of the following strategies would the hacker most likely adopt to bypass your security measures?","options":["The hacker might employ a 'blind' SQL Injection attack, taking advantage of the application's true or false responses to extract data bit by bit","The hacker may resort to a DDoS attack instead, attempting to crash the server and thus render the e-commerce site unavailable","The hacker may try to use SQL commands which are less known and less likely to be blocked by your system's security","The hacker could deploy an 'out-of-band' SQL Injection attack, extracting data via a different communication channel, such as DNS or HTTP requests"],"answer":"A"},{"id":258,"section":"SQL injection","question":"Suppose that you test an application for the SQL injection vulnerability. You know that the backend database is based on Microsoft SQL Server. In the login/password form, you enter the following credentials:\nBased on the above credentials, which of the following SQL commands are you expecting to be executed by the server, if there is indeed an SQL injection vulnerability?","options":["select * from Users where UserName =‘attack’ ’or 1=1 -- and UserPassword =‘123456’","select * from Users where UserName =‘attack’or 1=1 -- and UserPassword =‘123456’","select * from Users where UserName =‘attack or 1=1 -- and UserPassword =>‘123456’","select * from Users where UserName =‘attack’or 1=1 --’ and UserPassword = ‘123456’"],"answer":"D"},{"id":130,"section":"SQL injection","question":"In an intricate web application architecture using an Oracle database, you, as a security analyst, have identified a potential SQL Injection attack surface. The database consists of 'x' tables, each with 'y' columns. Each table contains 'z' records. An attacker, well-versed in SQLi techniques, crafts 'u' SQL payloads, each attempting to extract maximum data from the database. The payloads include 'UNION SELECT' statements and 'DBMS_XSLPROCESSOR.READ2CLOB' to read sensitive files. The attacker aims to maximize the total data extracted 'E=xyz*u'. Assuming 'x=4', 'y=2', and varying 'z' and 'u', which situation is likely to result in the highest extracted data volume?","options":["z=600, u=2: The attacker devises 2 SQL payloads, each aimed at tables holding 600 records, affecting all columns across all tables.","z=550, u=2: Here, the attacker formulates 2 SQL payloads and directs them towards tables containing 550 records, impacting all columns and tables.","z=500, u=3: The attacker creates 3 SQL payloads and targets tables with 500 records each, exploiting all columns and tables.","z=400, u=4: The attacker constructs 4 SQL payloads, each focusing on tables with 400 records, influencing all columns of all tables."],"answer":"D"},{"id":162,"section":"SQL injection","question":"Consider a hypothetical situation where an attacker, known for his proficiency in SQL Injection attacks, is targeting your web server. This adversary meticulously crafts 'q' malicious SQL queries, each inducing a delay of 'd' seconds in the server response. This delay in response is an indicator of a potential attack. If the total delay, represented by the product 'q*d', crosses a defined threshold 'T', an alert is activated in your security system. Furthermore, it is observed that the attacker prefers prime numbers for 'q', and 'd' follows a pattern in the Fibonacci sequence. Now, consider 'd=13' seconds (a Fibonacci number) and various values of 'q' (a prime number) and 'T'. Which among the following scenarios will most likely trigger an alert?","options":["q=17, T=220: Even though the attacker increases 'q', the total delay ('q*d' = 221 seconds) just surpasses the threshold, possibly activating an alert.","q=13, T=180: In this case, the total delay caused by the attacker ('q*d' = 169 seconds) breaches the threshold, likely leading to the triggering of a security alert.","q=11, T=150: Here, the total delay induced by the attacker ('q*d' = 143 seconds) does not surpass the threshold, so the security system remains dormant.","q=19, T=260: Despite the attacker's increased effort, the total delay ('q*d' = 247seconds) does not exceed the threshold, thus no alert is triggered."],"answer":"A"},{"id":149,"section":"估算","question":"**QUESTION #149\nAn audacious attacker is targeting a web server you oversee. He intends to perform a Slow HTTP POST attack, by manipulating 'a' HTTP connection. Each connection sends a byte of data every 'b' second, effectively holding up the connections for an extended period. Your server is designed to manage 'm' connections per second, but any connections exceeding this number tend to overwhelm the system. Given 'a=100' and variable 'm', along with the attacker's intention of maximizing the attack duration 'D=a*b', consider the following scenarios. Which is most likely to result in the longest duration of server unavailability?","options":["m=90, b=15: The server can manage 90 connections per second, but the attacker's 100 connections exceed this, and with each connection held up for 15 seconds, the attack duration could be significant.","m=105, b=12: The server can manage 105 connections per second, more than the attacker's 100 connections, likely maintaining operation despite a moderate hold-up time.","m=110, b=20: Despite the attacker sending 100 connections, the server can handle 110 connections per second, therefore likely staying operative, regardless of the hold-up time per connection.","m=95, b=10: Here, the server can handle 95 connections per second, but it falls short against the attacker's 100 connections, albeit the hold-up time per connection is lower."],"answer":"A"},{"id":220,"section":"估算","question":"**QUESTION #220\nA sophisticated attacker targets your web server with the intent to execute a Denial of Service (DoS) attack. His strategy involves a unique mixture of TCP SYN, UDP, and ICMP floods, using 'r' packets per second. Your server, reinforced with advanced security measures, can handle 'h' packets per second before it starts showing signs of strain. If 'r' surpasses 'h', it overwhelms the server, causing it to become unresponsive. In a peculiar pattern, the attacker selects 'r' as a composite number and 'h' as a prime number, making the attack detection more challenging. Considering 'r=2010' and different values for 'h', which of the following scenarios would potentially cause the server to falter?","options":["h=1987 (prime): The attacker's packet rate exceeds the server's capacity, causing potential unresponsiveness.","h=1999 (prime): Despite the attacker's packet flood, the server can handle these requests, remaining responsive.","h=1993 (prime): Despite being less than 'r', the server's prime number capacity keeps it barely operational, but the risk of falling is imminent.","h=2003 (prime): The server can manage more packets than the attacker is sending, hence it stays operational."],"answer":"A"},{"id":226,"section":"估算","question":"**QUESTION #226\nYour network infrastructure is under a SYN flood attack. The attacker has crafted an automated botnet to simultaneously send 's' SYN packets per second to the server. You have put measures in place to manage 'f' SYN packets per second, and the system is designed to deal with this number without any performance issues. If 's' exceeds 'f', the network infrastructure begins to show signs of overload. The system's response time increases exponentially (2^k), where 'k' represents each additional SYN packet above the 'f' limit. Now, considering 's=500' and different 'f' values, in which scenario is the server most likely to experience overload and significantly increased response times?","options":["f=510: The server can handle 510 SYN packets per second, which is greater than what the attacker is sending. The system stays stable, and the response time remains unaffected.","f=495: The server can handle 495 SYN packets per second. The response time drastically rises (2^5 = 32 times the normal), indicating a probable system overload.","f=505: The server can handle 505 SYN packets per second. In this case, the response time increases but not as drastically (2^5 = 32 times the normal), and the system might still function, albeit slowly.","f=490: The server can handle 490 SYN packets per second. With 's' exceeding 'f' by 10, the response time shoots up (2^10 = 1024 times the usual response time), indicating a system overload."],"answer":"D"},{"id":12,"section":"Nmap","question":"If you want to only scan fewer ports than the default scan using Nmap tool, which option would you use?","options":["-r","-F","-P","-sP"],"answer":"B"},{"id":33,"section":"Nmap","question":"A security analyst uses Zenmap to perform an ICMP timestamp ping scan to acquire information related to the current time from the target host machine.\nWhich of the following Zenmap options must the analyst use to perform the ICMP timestamp ping scan?","options":["-Pn","-PU","-PP","-PY"],"answer":"C"},{"id":74,"section":"Nmap","question":"Consider the following Nmap output:\nWhat command-line parameter could you use to determine the type and version number of the web server?","options":["-sV","-sS","-Pn","-V"],"answer":"A"},{"id":95,"section":"Nmap","question":"Techno Security Inc. recently hired John as a penetration tester. He was tasked with identifying open ports in the target network and determining whether the ports are online and any firewall rule sets are encountered.\nJohn decided to perform a TCP SYN ping scan on the target network.\nWhich of the following Nmap commands must John use to perform the TCP SYN ping scan?","options":["nmap -sn -PO < target IP address >","nmap -sn -PS < target IP address >","nmap -sn -PA < target IP address >","nmap -sn -PP < target IP address >"],"answer":"B"},{"id":293,"section":"Nmap","question":"You are a penetration tester and are about to perform a scan on a specific server. The agreement that you signed with the client contains the following specific condition for the scan: “The attacker must scan every port on the server several times using a set of spoofed source IP addresses.” Suppose that you are using Nmap to perform this scan.\nWhat flag will you use to satisfy this requirement?","options":["The -g flag","The -A flag","The -f flag","The -D flag"],"answer":"D"},{"id":299,"section":"Nmap","question":"Jim, a professional hacker, targeted an organization that is operating critical industrial infrastructure. Jim used Nmap to scan open ports and running services on systems connected to the organization‵s OT network. He used an Nmap command to identify Ethernet/IP devices connected to the Internet and further gathered information such as the vendor name, product code and name, device name, and IP address.\nWhich of the following Nmap commands helped Jim retrieve the required information?","options":["nmap -Pn -sT --scan-delay 1s --max-parallelism 1 -p < Port List > < Target IP >","nmap -Pn -sU -p 44818 --script enip-info < Target IP >","nmap -Pn -sT -p 46824 < Target IP >","nmap -Pn -sT -p 102 --script s7-info < Target IP >"],"answer":"B"},{"id":303,"section":"Nmap","question":"Which Nmap switch helps evade IDS or firewalls?","options":["-D","-n/-R","-T","-oN/-oX/-oG"],"answer":"A"},{"id":321,"section":"Nmap","question":"While performing an Nmap scan against a host, Paola determines the existence of a firewall. In an attempt to determine whether the firewall is stateful or stateless, which of the following options would be best to use?","options":["-sA","-sX","-sT","-sF"],"answer":"A"},{"id":314,"section":"Nmap","question":"You are attempting to run an Nmap port scan on a web server. Which of the following commands would result in a scan of common ports with the least amount of noise in order to evade IDS?","options":["nmap -A - Pn","nmap -sP -p-65535 -T5","nmap -sT -O -T0","nmap -A --host-timeout 99 -T1"],"answer":"C"},{"id":147,"section":"Nmap","question":"**QUESTION #147\nDuring a red team assessment, a CEH is given a task to perform network scanning on the target network without revealing its IP address. They are also required to find an open port and the services available on the target machine. What scanning technique should they employ, and which command in Zenmap should they use?","options":["Use SCTP INIT Scan with the command \"-sY\"","Use UDP Raw ICMP Port Unreachable Scanning with the command \"-sU\"","Use the ACK flag probe scanning technique with the command \"-sA\"","Use the IDLE/IPID header scan technique with the command \"-sI\""],"answer":"D"},{"id":114,"section":"Nmap","question":"Sam is a penetration tester hired by Inception Tech, a security organization. He was asked to perform port scanning on a target host in the network. While performing the given task, Sam sends FIN/ACK probes and determines that an RST packet is sent in response by the target host, indicating that the port is closed.\nWhat is the port scanning technique used by Sam to discover open ports?","options":["Xmas scan","IDLE/IPID header scan","TCP Maimon scan","ACK flag probe scan"],"answer":"C"},{"id":84,"section":"Nmap","question":"**QUESTION #84\nAndrew is an Ethical Hacker who was assigned the task of discovering all the active devices hidden by a restrictive firewall in the IPv4 range in a given target network.\nWhich of the following host discovery techniques must he use to perform the given task?","options":["UDP scan","ARP ping scan","ACK flag probe scan","TCP Maimon scan"],"answer":"B"},{"id":230,"section":"Nmap","question":"**QUESTION #230\nConsider a scenario where a Certified Ethical Hacker is attempting to infiltrate a company's network without being detected. The hacker intends to use a stealth scan on a BSD-derived TCP/IP stack, but he suspects that the network security devices may be able to detect SYN packets. Based on this information, which of the following methods should he use to bypass the detection mechanisms and why?","options":["Maimon Scan, because it is very similar to NULL, FIN, and Xmas scans, but the probe used here is FIN/ACK","Xmas Scan, because it can pass through filters undetected, depending on the security mechanisms installed","TCP Connect/Full-Open Scan, because it completes a three-way handshake with the target machine","ACK Flag Probe Scan, because it exploits the vulnerabilities within the BSD-derived TCP/IP stack"],"answer":"D"},{"id":195,"section":"Nmap","question":"**QUESTION #195\nA Certified Ethical Hacker (CEH) is analyzing a target network. To do this, he decides to utilize an IDLE/IPID header scan using Nmap. The network analysis reveals that the IPID number increases by 2 after following the steps of an IDLE scan. Based on this information, what can the CEH conclude about the target network?","options":["The ports on the target network are open","The target network has no firewall present","The ports on the target network are closed","The target network has a stateful firewall present"],"answer":"A"},{"id":202,"section":"Nmap","question":"During a penetration testing assignment, a Certified Ethical Hacker (CEH) used a set of scanning tools to create a profile of the target organization. The CEH wanted to scan for live hosts, open ports, and services on a target network. He used Nmap for network inventory and Hping3 for network security auditing. However, he wanted to spoof IP addresses for anonymity during probing. Which command should the CEH use to perform this task?","options":["Hping3 -1 10.0.0.25 -ICMP","Hping3 -2 10.0.0.25-p 80","Nmap -sS -Pn -n -vw --packet-trace -p- --script discovery -T4","Hping3 -S 192.168.1.1 -a 192.168.1.254 -p 22 --flood"],"answer":"D"},{"id":203,"section":"Nmap","question":"An ethical hacker is hired to conduct a comprehensive network scan of a large organization that strongly suspects potential intrusions into their internal systems. The hacker decides to employ a combination of scanning tools to obtain a detailed understanding of the network. Which sequence of actions would provide the most comprehensive information about the network's status?","options":["Use Hping3 for an ICMP ping scan on the entire subnet, then use Nmap for a SYN scan on identified active hosts, and finally use Metasploit to exploit identified vulnerabilities.","Start with Hping3 for a UDP scan on random ports, then use Nmap for a version detection scan, and finally use Metasploit to exploit detected vulnerabilities.","Begin with NetScanTools Pro for a general network scan, then use Nmap for OS detection and version detection, and finally perform an SYN flooding with Hping3.","Initiate with Nmap for a ping sweep, then use Metasploit to scan for open ports and services, and finally use Hping3 to perform remote OS fingerprinting."],"answer":"D"},{"id":21,"section":"CLOUD","question":"Joe works as an IT administrator in an organization and has recently set up a cloud computing service for the organization. To implement this service, he reached out to a telecom company for providing Internet connectivity and transport services between the organization and the cloud service provider.\nIn the NIST cloud deployment reference architecture, under which category does the telecom company fall in the above scenario?","options":["Cloud consumer","Cloud broker","Cloud auditor","Cloud carrier"],"answer":"D"},{"id":267,"section":"CLOUD","question":"According to the NIST cloud deployment reference architecture, which of the following provides connectivity and transport services to consumers?","options":["Cloud connector","Cloud broker","Cloud provider","Cloud carrier"],"answer":"D"},{"id":24,"section":"CLOUD","question":"Annie, a cloud security engineer, uses the Docker architecture to employ a client/server model in the application she is working on. She utilizes a component that can process API requests and handle various Docker objects, such as containers, volumes, images, and networks. What is the component of the Docker architecture used by Annie in the above scenario?","options":["Docker objects","Docker daemon","Docker client","Docker registries"],"answer":"B"},{"id":45,"section":"CLOUD","question":"Alice, a professional hacker, targeted an organization‵s cloud services. She infiltrated the target‵s MSP provider by sending spear-phishing emails and distributed custom-made malware to compromise user accounts and gain remote access to the cloud service. Further, she accessed the target customer profiles with her MSP account, compressed the customer data, and stored them in the MSP. Then, she used this information to launch further attacks on the target organization.\nWhich of the following cloud attacks did Alice perform in the above scenario?","options":["Cloud cryptojacking","Man-in-the-cloud (MITC) attack","Cloud hopper attack","Cloudborne attack"],"answer":"C"},{"id":308,"section":"CLOUD","question":"Thomas, a cloud security professional, is performing security assessment on cloud services to identify any loopholes. He detects a vulnerability in a bare-metal cloud server that can enable hackers to implant malicious backdoors in its firmware. He also identified that an installed backdoor can persist even if the server is reallocated to new clients or businesses that use it as an IaaS.\nWhat is the type of cloud attack that can be performed by exploiting the vulnerability discussed in the above scenario?","options":["Cloudborne attack","Man-in-the-cloud (MITC) attack","Metadata spoofing attack","Cloud cryptojacking"],"answer":"A"},{"id":78,"section":"CLOUD","question":"There are multiple cloud deployment options depending on how isolated a customer‵s resources are from those of other customers. Shared environments share the costs and allow each customer to enjoy lower operations expenses. One solution is for a customer to join with a group of users or organizations to share a cloud environment.\nWhat is this cloud deployment option called?","options":["Private","Community","Public","Hybrid"],"answer":"B"},{"id":85,"section":"CLOUD","question":"Abel, a cloud architect, uses container technology to deploy applications/software including all its dependencies, such as libraries and configuration files, binaries, and other resources that run independently from other processes in the cloud environment. For the containerization of applications, he follows the five-tier container technology architecture. Currently, Abel is verifying and validating image contents, signing images, and sending them to the registries. Which of the following tiers of the container technology architecture is Abel currently working in?","options":["Tier-1: Developer machines","Tier-2: Testing and accreditation systems","Tier-3: Registries","Tier-4: Orchestrators"],"answer":"B"},{"id":116,"section":"CLOUD","question":"Heather‵s company has decided to use a new customer relationship management tool. After performing the appropriate research, they decided to purchase a subscription to a cloud-hosted solution. The only administrative task that Heather will need to perform is the management of user accounts. The provider will take care of the hardware, operating system, and software administration including patching and monitoring.\nWhich of the following is this type of solution?","options":["IaaS","SaaS","PaaS","CaaS"],"answer":"B"},{"id":126,"section":"CLOUD","question":"You are a cybersecurity specialist at CloudTech Inc., a company providing cloud-based services. You are managing a project for a client who wants to migrate their sensitive data to a public cloud service. To comply with regulatory requirements, the client insists on maintaining full control over the encryption keys even when the data is at rest on the cloud. Which of the following practices should you implement to meet this requirement?","options":["Encrypt data client-side before uploading to the cloud and retain control of the encryption keys.","Use the cloud service provider's encryption services but store keys on-premises.","Rely on Secure Sockets Layer (SSL) encryption for data at rest.","Use the cloud service provider's default encryption and key management services."],"answer":"A"},{"id":158,"section":"CLOUD","question":"You work as a cloud security specialist at SkyNet Solutions. One of your clients is a healthcare organization that plans to migrate its electronic health record (EHR) system to the cloud. This system contains highly sensitive personal and medical data. As part of your job, you need to ensure the security and privacy of this data while it is being transferred and stored in the cloud. You recommend that data should be encrypted during transit and at rest. However, you also need to ensure that even if a cloud service provider(CSP) has access to encrypted data, they should not be able to decrypt it. Which of the following would be the most suitable strategy to meet this requirement?","options":["Rely on network-level encryption protocols for data transfer.","Use SSL/TLS for data transfer and allow the CSP to manage encryption keys.","Utilize the CSP's built-in data encryption services.","Use client-side encryption and manage encryption keys independently of the CSP."],"answer":"D"},{"id":161,"section":"CLOUD","question":"You are a security analyst for CloudSec, a company providing cloud security solutions. One of your clients, a financial institution, wants to shift its operations to a public cloud while maintaining a high level of security control. They want to ensure that they can monitor all their cloud resources continuously and receive real-time alerts about potential security threats. They also want to enforce their security policies consistently across all cloud workloads. Which of the following solutions would best meet these requirements?","options":["Implement a Virtual Private Network (VPN) for secure data transmission.","Deploy a Cloud Access Security Broker (CASB).","Use multi-factor authentication for all cloud user accounts.","Use client-side encryption for all stored data."],"answer":"B"},{"id":193,"section":"CLOUD","question":"As a security analyst for SkySecure Inc., you are working with a client that uses a multi-cloud strategy, utilizing services from several cloud providers. The client wants to implement a system that will provide unified security management across all their cloud platforms. They need a solution that allows them to consistently enforce security policies, identify and respond to threats, and maintain visibility of all their cloud resources. Which of the following should you recommend as the best solution?","options":["Use a Cloud Access Security Broker (CASB).","Use a hardware-based firewall to secure all cloud resources.","Implement separate security management tools for each cloud platform.","Rely on the built-in security features of each cloud platform."],"answer":"A"},{"id":190,"section":"CLOUD","question":"You are the chief cybersecurity officer at CloudSecure Inc., and your team is responsible for securing a cloud based application that handles sensitive customer data. To ensure that the data is protected from breaches, you have decided to implement encryption for both data-at-rest and data-in-transit. The development team suggests using SSL/TLS for securing data in transit. However, you want to also implement a mechanism to detect if the data was tampered with during transmission. Which of the following should you propose?","options":["Implement IPsec in addition to SSL/TLS.","Switch to using SSH for data transmission.","Encrypt data using the AES algorithm before transmission.","Use the cloud service provider's built-in encryption services."],"answer":"A"},{"id":205,"section":"CLOUD","question":"As a cybersecurity consultant, you are working with a client who wants to migrate their data to a Software as a Service (SaaS) cloud environment. They are particularly concerned about maintaining the privacy of their sensitive data, even from the cloud service provider. Which of the following strategies would best ensure the privacy of their data in the SaaS environment?","options":["Implement a Virtual Private Network (VPN) for accessing the SaaS applications.","Rely on the cloud service provider's built-in security features.","Encrypt the data client-side before uploading to the SaaS environment and manage encryption keys independently.","Use multi-factor authentication for all user accounts accessing the SaaS applications"],"answer":"C"},{"id":266,"section":"CLOUD","question":"Geena, a cloud architect, uses a master component in the Kubernetes cluster architecture that scans newly generated pods and allocates a node to them. This component can also assign nodes based on factors such as the overall resource requirement, data locality, software/hardware/policy restrictions, and internal workload interventions.\nWhich of the following master components is explained in the above scenario?","options":["Kube-apiserver","Etcd cluster","Kube-controller-manager","Kube-scheduler"],"answer":"D"},{"id":2,"section":"Softwares/Tools","question":"Josh, a security analyst, wants to choose a tool for himself to examine links between data. One of the main requirements is to present data using graphs and link analysis.\nWhich of the following tools will meet John's requirements?","options":["Palantir.","Maltego.","Metasploit.","Analyst's Notebook."],"answer":"B"},{"id":17,"section":"Softwares/Tools","question":"An attacker, using a rogue wireless AP, performed an MITM attack and injected an HTML code to embed a malicious applet in all HTTP connections.\nWhen users accessed any page, the applet ran and exploited many machines. Which one of the following tools the hacker probably used to inject HTML code?","options":["Wireshark","Ettercap","Aircrack-ng","Tcpdump"],"answer":"B"},{"id":19,"section":"Softwares/Tools","question":"Which of the following tools is used to analyze the files produced by several packet-capture programs such as tcpdump, WinDump, Wireshark, and EtherPeek?","options":["tcptrace","Nessus","OpenVAS","tcptraceroute"],"answer":"A"},{"id":23,"section":"Softwares/Tools","question":"John, a professional hacker, targeted an organization that uses LDAP for accessing distributed directory services. He used an automated tool to anonymously query the LDAP service for sensitive information such as usernames, addresses, departmental details, and server names to launch further attacks on the target organization.\nWhat is the tool employed by John to gather information from the LDAP service?","options":["ike-scan","Zabasearch","JXplorer","EarthExplorer"],"answer":"C"},{"id":30,"section":"Softwares/Tools","question":"Sophia is a shopping enthusiast who spends significant time searching for trendy outfits online. Clark, an attacker, noticed her activities several times and sent a fake email containing a deceptive page link to her social media page displaying all-new and trendy outfits. In excitement, Sophia clicked on the malicious link and logged in to that page using her valid credentials.\nWhich of the following tools is employed by Clark to create the spoofed email?","options":["Evilginx","Slowloris","PLCinject","PyLoris"],"answer":"A"},{"id":43,"section":"Softwares/Tools","question":"**QUESTION #43\nWilson, a professional hacker, targets an organization for financial benefit and plans to compromise its systems by sending malicious emails. For this purpose, he uses a tool to track the emails of the target and extracts information such as sender identities, mail servers, sender IP addresses, and sender locations from different public sources. He also checks if an email address was leaked using the haveibeenpwned.com API.\nWhich of the following tools is used by Wilson in the above scenario?","options":["Factiva","ZoomInfo","Netcraft","Infoga"],"answer":"D"},{"id":288,"section":"Softwares/Tools","question":"**QUESTION #288\nJack, a professional hacker, targets an organization and performs vulnerability scanning on the target web server to identify any possible weaknesses, vulnerabilities, and misconfigurations. In this process, Jack uses an automated tool that eases his work and performs vulnerability scanning to find hosts, services, and other vulnerabilities in the target server.\nWhich of the following tools is used by Jack to perform vulnerability scanning?","options":["Infoga","NCollector Studio","Netsparker","WebCopier Pro"],"answer":"C"},{"id":51,"section":"Softwares/Tools","question":"Miley, a professional hacker, decided to attack a target organization's network. To perform the attack, she used a tool to send fake ARP messages over the target network to link her MAC address with the target system's IP address. By performing this, Miley received messages directed to the victim's MAC address and further used the tool to intercept steal, modify, and block sensitive communication to the target system.\nWhat is the tool employed by Miley to perform the above attack?","options":["Wireshark","BetterCAP","DerpNSpoof","Gobbler"],"answer":"B"},{"id":54,"section":"Softwares/Tools","question":"Jake, a professional hacker, installed spyware on a target iPhone to spy on the target user‵s activities. He can take complete control of the target mobile device by jailbreaking the device remotely and record audio, capture screenshots, and monitor all phone calls and SMS messages.\nWhat is the type of spyware that Jake used to infect the target device?","options":["DroidSheep","Androrat","Trident","Zscaler"],"answer":"C"},{"id":58,"section":"Softwares/Tools","question":"Morris, an attacker, wanted to check whether the target AP is in a locked state. He attempted using different utilities to identify WPS-enabled APs in the target wireless network. Ultimately, he succeeded with one special command-line utility.\nWhich of the following command-line utilities allowed Morris to discover the WPS-enabled APs?","options":["wash","net view","macof","ntptrace"],"answer":"A"},{"id":59,"section":"Softwares/Tools","question":"BitLocker encryption has been implemented for all the Windows-based computers in an organization. You are concerned that someone might lose their cryptographic key. Therefore, a mechanism was implemented to recover the keys from Active Directory.\nWhat is this mechanism called in cryptography?","options":["Key archival","Certificate rollover","Key escrow","Key renewal"],"answer":"C"},{"id":60,"section":"Softwares/Tools","question":"**QUESTION #60\nEmily, an extrovert obsessed with social media, posts a large amount of private information, photographs, and location tags of recently visited places. Realizing this, James, a professional hacker, targets Emily and her acquaintances, conducts a location search to detect their geolocation by using an automated tool, and gathers information to perform other sophisticated attacks.\nWhat is the tool employed by James in the above scenario?","options":["ophcrack","VisualRoute","Hootsuite","HULK"],"answer":"C"},{"id":103,"section":"Softwares/Tools","question":"Mason, a professional hacker, targets an organization and spreads Emotet malware through malicious script. After infecting the victim's device, Mason further used Emotet to spread the infection across local networks and beyond to compromise as many machines as possible. In this process, he used a tool, which is a self-extracting RAR file, to retrieve information related to network resources such as writable share drives.\nWhat is the tool employed by Mason in the above scenario?","options":["NetPass.exe","Outlook scraper","WebBrowserPassView","Credential enumerator"],"answer":"D"},{"id":112,"section":"Softwares/Tools","question":"**QUESTION #112\nAn organization decided to harden its security against web-application and web-server attacks. John, a security personnel in the organization, employed a security scanner to automate webapplication security testing and to guard the organization's web infrastructure against webapplication threats. Using that tool, he also wants to detect XSS, directory transversal problems, fault injection, SQL injection, attempts to execute commands, and several other attacks. Which of the following security scanners will help John perform the above task?","options":["AlienVaultR OSSIMTM","Syhunt Hybrid","Saleae Logic Analyzer","Cisco ASA"],"answer":"B"},{"id":113,"section":"Softwares/Tools","question":"Which of the following Metasploit post-exploitation modules can be used to escalate privileges on Windows systems?","options":["getsystem","getuid","keylogrecorder","autoroute"],"answer":"A"},{"id":115,"section":"Softwares/Tools","question":"An organization has automated the operation of critical infrastructure from a remote location. For this purpose, all the industrial control systems are connected to the Internet. To empower the manufacturing process, ensure the reliability of industrial networks, and reduce downtime and service disruption, the organization decided to install an OT security tool that further protects against security incidents such as cyber espionage, zero-day attacks, and malware.\nWhich of the following tools must the organization employ to protect its critical infrastructure?","options":["Robotium","BalenaCloud","Flowmon","IntentFuzzer"],"answer":"C"},{"id":117,"section":"Softwares/Tools","question":"Juliet, a security researcher in an organization, was tasked with checking for the authenticity of images to be used in the organization's magazines. She used these images as a search query and tracked the original source and details of the images, which included photographs, profile pictures, and memes.\nWhich of the following footprinting techniques did Rachel use to finish her task?","options":["Google advanced search","Meta search engines","Reverse image search","Advanced image search"],"answer":"C"},{"id":210,"section":"Softwares/Tools","question":"During a red team engagement, an ethical hacker is tasked with testing the security measures of an organization's wireless network. The hacker needs to select an appropriate tool to carry out a session hijacking attack. Which of the following tools should the hacker use to effectively perform session hijacking and subsequent security analysis, given that the target wireless network has the Wi-Fi Protected Access-pre-shared key (WPA-PSK) security protocol in place?","options":["Hetty","bettercap","DroidSheep","FaceNiff"],"answer":"B"},{"id":232,"section":"Softwares/Tools","question":"You are a security analyst of a large IT company and are responsible for maintaining the organization‵s security posture. You are evaluating multiple vulnerability assessment tools for your network. Given that your network has a hybrid IT environment with on-premise and cloud assets, which tool would be most appropriate considering its comprehensive coverage and visibility, continuous scanning, and ability to monitor unexpected changes before they turn into breaches?","options":["GFI LanCuard","Qualys Vulnerability Management","Open VAS","Nessus Professional"],"answer":"B"},{"id":284,"section":"Softwares/Tools","question":"**QUESTION #284\nJames is working as an ethical hacker at Technix Solutions. The management ordered James to discover how vulnerable its network is towards footprinting attacks. James took the help of an open-source framework for performing automated reconnaissance activities. This framework helped James in gathering information using free tools and resources.\nWhat is the framework used by James to conduct footprinting and reconnaissance activities?","options":["OSINT framework","WebSploit Framework","Browser Exploitation Framework","SpeedPhish Framework"],"answer":"A"},{"id":290,"section":"Softwares/Tools","question":"In an attempt to damage the reputation of a competitor organization, Hailey, a professional hacker, gathers a list of employee and client email addresses and other related information by using various search engines, social networking sites, and web spidering tools. In this process, she also uses an automated tool to gather a list of words from the target website to further perform a brute-force attack on the previously gathered email addresses.\nWhat is the tool used by Hailey for gathering a list of words from the target website?","options":["CeWL","Orbot","Shadowsocks","Psiphon"],"answer":"A"},{"id":317,"section":"Softwares/Tools","question":"Gerard, a disgruntled ex-employee of Sunglass IT Solutions, targets this organization to perform sophisticated attacks and bring down its reputation in the market. To launch the attacks process, he performed DNS footprinting to gather information about DNS servers and to identify the hosts connected in the target network. He used an automated tool that can retrieve information about DNS zone data including DNS domain names, computer names, IP addresses, DNS records, and network Whois records. He further exploited this information to launch other sophisticated attacks.\nWhat is the tool employed by Gerard in the above scenario?","options":["Towelroot","Knative","zANTI","Bluto"],"answer":"D"},{"id":52,"section":"Softwares/Tools","question":"George, an employee of an organization, is attempting to access restricted websites from an official computer. For this purpose, he used an anonymizer that masked his real IP address and ensured complete and continuous anonymity for all his online activities.\nWhich of the following anonymizers helps George hide his activities?","options":["https://www.baidu.com","https://www.guardster.com","https://www.wolframalpha.com","https://karmadecay.com"],"answer":"B"},{"id":325,"section":"Softwares/Tools","question":"Taylor, a security professional, uses a tool to monitor her company‵s website, analyze the website‵s traffic, and track the geographical location of the users visiting the company‵s website.\nWhich of the following tools did Taylor employ in the above scenario?","options":["Webroot","Web-Stat","WebSite-Watcher","WAFW00F"],"answer":"B"},{"id":28,"section":"方法技術","question":"To create a botnet, the attacker can use several techniques to scan vulnerable machines. The attacker first collects information about a large number of vulnerable machines to create a list. Subsequently, they infect the machines. The list is divided by assigning half of the list to the newly compromised machines. The scanning process runs simultaneously. This technique ensures the spreading and installation of malicious code in little time. Which technique is discussed here?","options":["Subnet scanning technique","Permutation scanning technique","Hit-list scanning technique.","Topological scanning technique"],"answer":"C"},{"id":38,"section":"方法技術","question":"Jane is working as a security professional at CyberSol Inc. She was tasked with ensuring the authentication and integrity of messages being transmitted in the corporate network. To encrypt the messages, she implemented a security model in which every user in the network maintains a ring of public keys. In this model, a user needs to encrypt a message using the receiver‵s public key, and only the receiver can decrypt the message using their private key.\nWhat is the security model implemented by Jane to secure corporate messages?","options":["Zero trust network","Secure Socket Layer (SSL)","Transport Layer Security (TLS)","Web of trust (WOT)"],"answer":"D"},{"id":50,"section":"方法技術","question":"Eric, a cloud security engineer, implements a technique for securing the cloud resources used by his organization. This technique assumes by default that a user attempting to access the network is not an authentic entity and verifies every incoming connection before allowing access to the network. Using this technique, he also imposed conditions such that employees can access only the resources required for their role.\nWhat is the technique employed by Eric to secure cloud resources?","options":["Demilitarized zone","Zero trust network","Serverless computing","Container technology"],"answer":"B"},{"id":247,"section":"方法技術","question":"Alex, a cloud security engineer working in Eyecloud Inc. is tasked with isolating applications from the underlying infrastructure and stimulating communication via well-defined channels. For this purpose, he used an open-source technology that helped him in developing, packaging, and running applications; further, the technology provides PaaS through OS-level virtualization, delivers containerized software packages, and promotes fast software delivery.\nWhat is the cloud technology employed by Alex in the above scenario?","options":["Virtual machine","Docker","Zero trust network","Serverless computing"],"answer":"B"},{"id":248,"section":"方法技術","question":"Henry is a penetration tester who works for XYZ organization. While performing enumeration on a client organization, he queries the DNS server for a specific cached DNS record. Further, by using this cached record, he determines the sites recently visited by the organization's user.\nWhat is the enumeration technique used by Henry on the organization?","options":["DNS zone walking","DNS cache snooping","DNS cache poisoning","DNSSEC zone walking"],"answer":"B"},{"id":124,"section":"方法技術","question":"**QUESTION #124\nJohn, a professional hacker, decided to use DNS to perform data exfiltration on a target network. In this process, he embedded malicious data into the DNS protocol packets that even DNSSEC cannot detect. Using this technique, John successfully injected malware to bypass a firewall and maintained communication with the victim machine and C&C server. What is the technique employed by John to bypass the firewall?","options":["DNSSEC zone walking","DNS cache snooping","DNS enumeration","DNS tunneling method"],"answer":"D"},{"id":251,"section":"方法技術","question":"**QUESTION #251\nJohn, a disgruntled ex-employee of an organization, contacted a professional hacker to exploit the organization. In the attack process, the professional hacker installed a scanner on a machine belonging to one of the victims and scanned several machines on the same network to identify vulnerabilities to perform further exploitation.\nWhat is the type of vulnerability assessment tool employed by John in the above scenario?","options":["Agent-based scanner","Network-based scanner","Cluster scanner","Proxy scanner"],"answer":"A"},{"id":233,"section":"方法技術","question":"Martin, a Certified Ethical Hacker (CEH), is conducting a penetration test on a large enterprise network. He suspects that sensitive information might be leaking out of the network. Martin decides to use network sniffing as part of his testing methodology. Which of the following sniffing techniques should Martin employ to get a comprehensive understanding of the data flowing across the network?","options":["Raw Sniffing","MAC Flooding","ARP Poisoning","DNS Poisoning"],"answer":"A"},{"id":1,"section":"attack/vulnerability Name","question":"Black-hat hacker Ivan attacked the SCADA system of the industrial water facility. During the exploration process, he discovered that outdated equipment was being used, the human-machine interface (HMI) was directly connected to the Internet and did not have any security tools or authentication mechanism. This allowed Ivan to control the system and influence all processes (including water pressure and temperature). What category does this vulnerability belong to?","options":["Credential Management.","Lack of Authorization/Authentication and Insecure Defaults.","Memory Corruption.","Code Injection."],"answer":"B"},{"id":6,"section":"attack/vulnerability Name","question":"During the pentest, Maria, the head of the blue team, discovered that the new online service has problems with the authentication mechanism. The old password can be reset by correctly answering the secret QUESTION, and the sending form does not have protection using a CAPTCHA, which allows a potential attacker to use a brute force attack. What is the name of such an attack in the Enumeration of Common Disadvantages (CWE)?","options":["Insecure transmission of credentials.","Verbose failure messages.","User impersonation.","Weak password recovery mechanism."],"answer":"D"},{"id":7,"section":"attack/vulnerability Name","question":"Which of the following web application attack inject the special character elements \"Carriage Return\" and \"Line Feed\" into the user‵s input to trick the web server, web application, or user into believing that the current object is terminated and a new object has been initiated?","options":["Log Injection.","HTML Injection.","Server-Side JS Injection.","CRLF Injection."],"answer":"D"},{"id":18,"section":"attack/vulnerability Name","question":"Which of the following is a low-tech way of gaining unauthorized access to systems?","options":["Social Engineering","Eavesdropping","Scanning","Sniffing"],"answer":"A"},{"id":22,"section":"attack/vulnerability Name","question":"Bobby, an attacker, targeted a user and decided to hijack and intercept all their wireless communications. He installed a fake communication tower between two authentic endpoints to mislead the victim. Bobby used this virtual tower to interrupt the data transmission between the user and real tower, attempting to hijack an active session. Upon receiving the user‵s request, Bobby manipulated the traffic with the virtual tower and redirected the victim to a malicious website.\nWhat is the attack performed by Bobby in the above scenario?","options":["aLTEr attack","Jamming signal attack","Wardriving","KRACK attack"],"answer":"A"},{"id":90,"section":"attack/vulnerability Name","question":"In this attack, an adversary tricks a victim into reinstalling an already-in-use key. This is achieved by manipulating and replaying cryptographic handshake messages. When the victim reinstalls the key, associated parameters such as the incremental transmit packet number and receive packet number are reset to their initial values. What is this attack called?","options":["Evil twin","Chop chop attack","Wardriving","KRACK"],"answer":"D"},{"id":36,"section":"attack/vulnerability Name","question":"Which type of attack attempts to overflow the content-addressable memory (CAM) table in an Ethernet switch?","options":["DDoS attack","Evil twin attack","DNS cache flooding","MAC flooding"],"answer":"D"},{"id":42,"section":"attack/vulnerability Name","question":"Jack, a disgruntled ex-employee of Incalsol Ltd., decided to inject fileless malware into Incalsol's systems. To deliver the malware, he used the current employees' email IDs to send fraudulent emails embedded with malicious links that seem to be legitimate. When a victim employee clicks on the link, they are directed to a fraudulent website that automatically loads Flash and triggers the exploit.\nWhat is the technique used by Jack to launch the fileless malware on the target systems?","options":["In-memory exploits","Legitimate applications","Script-based injection","Phishing"],"answer":"D"},{"id":48,"section":"attack/vulnerability Name","question":"Jason, an attacker, targeted an organization to perform an attack on its Internet-facing web server with the intention of gaining access to backend servers, which are protected by a firewall. In this process, he used a URL https://xyz.com/feed.php?url=externalsite.com/feed/to to obtain a remote feed and altered the URL input to the local host to view all the local resources on the target server.\nWhat is the type of attack Jason performed in the above scenario?","options":["Web server misconfiguration","Server-side request forgery (SSRF) attack","Web cache poisoning attack","Website defacement"],"answer":"B"},{"id":56,"section":"attack/vulnerability Name","question":"Kate dropped her phone and subsequently encountered an issue with the phone's internal speaker. Thus, she is using the phone's loudspeaker for phone calls and other activities. Bob, an attacker, takes advantage of this vulnerability and secretly exploits the hardware of Kate's phone so that he can monitor the loudspeaker's output from data sources such as voice assistants, multimedia messages, and audio files by using a malicious app to breach speech privacy.\nWhat is the type of attack Bob performed on Kate in the above scenario?","options":["SIM card attack","aLTEr attack","Spearphone attack","Man-in-the-disk attack"],"answer":"C"},{"id":66,"section":"attack/vulnerability Name","question":"Stella, a professional hacker, performs an attack on web services by exploiting a vulnerability that provides additional routing information in the SOAP header to support asynchronous communication. This further allows the transmission of web-service requests and response messages using different TCP connections.\nWhich of the following attack techniques is used by Stella to compromise the web services?","options":["Web services parsing attacks","WS-Address spoofing","SOAPAction spoofing","XML injection"],"answer":"B"},{"id":67,"section":"attack/vulnerability Name","question":"Attacker Steve targeted an organization‵s network with the aim of redirecting the company‵s web traffic to another malicious website. To achieve this goal, Steve performed DNS cache poisoning by exploiting the vulnerabilities in the DNS server software and modified the original IP address of the target website to that of a fake website.\nWhat is the technique employed by Steve to gather information for identity theft?","options":["Pharming","Skimming","Pretexting","Wardriving"],"answer":"A"},{"id":309,"section":"attack/vulnerability Name","question":"Which of the following tactics uses malicious code to redirect users’ web traffic?","options":["Spear-phishing","Phishing","Spimming","Pharming"],"answer":"D"},{"id":80,"section":"attack/vulnerability Name","question":"Don, a student, came across a gaming app in a third-party app store and installed it.\nSubsequently, all the legitimate apps in his smartphone were replaced by deceptive applications that appeared legitimate. He also received many advertisements on his smartphone after installing the app.\nWhat is the attack performed on Don in the above scenario?","options":["SIM card attack","Clickjacking","SMS phishing attack","Agent Smith attack"],"answer":"D"},{"id":81,"section":"attack/vulnerability Name","question":"You are a penetration tester tasked with testing the wireless network of your client Brakeme SA.\nYou are attempting to break into the wireless network with the SSID “Brakeme-Internal.” You realize that this network uses WPA3 encryption.\nWhich of the following vulnerabilities is the promising to exploit?","options":["Cross-site request forgery","Dragonblood","Key reinstallation attack","AP misconfiguration"],"answer":"B"},{"id":83,"section":"attack/vulnerability Name","question":"A DDoS attack is performed at layer 7 to take down web infrastructure. Partial HTTP requests are sent to the web infrastructure or applications. Upon receiving a partial request, the target servers opens multiple connections and keeps waiting for the requests to complete. Which attack is being described here?","options":["Desynchronization","Slowloris attack","Session splicing","Phlashing"],"answer":"B"},{"id":257,"section":"attack/vulnerability Name","question":"Kevin, a professional hacker, wants to penetrate CyberTech Inc‵s network. He employed a technique, using which he encoded packets with Unicode characters. The company‵s IDS cannot recognize the packets, but the target web server can decode them. What is the technique used by Kevin to evade the IDS system?","options":["Session splicing","Urgency flag","Obfuscating","Desynchronization"],"answer":"C"},{"id":96,"section":"attack/vulnerability Name","question":"Ricardo has discovered the username for an application in his target‵s environment. As he has a limited amount of time, he decides to attempt to use a list of common passwords he found on the Internet. He compiles them into a list and then feeds that list as an argument into his passwordcracking application.\nWhat type of attack is Ricardo performing?","options":["Brute force","Known plaintext","Dictionary","Password spraying"],"answer":"C"},{"id":104,"section":"attack/vulnerability Name","question":"Which of the following Bluetooth hacking techniques refers to the theft of information from a wireless device through Bluetooth?","options":["Bluesmacking","Bluesnarfing","Bluejacking","Bluebugging"],"answer":"B"},{"id":106,"section":"attack/vulnerability Name","question":"**QUESTION #106\nAttacker Simon targeted the communication network of an organization and disabled the security controls of NetNTLMv1 by modifying the values of LMCompatibilityLevel, NTLMMinClientSec, and RestrictSendingNTLMTraffic. He then extracted all the non-network logon tokens from all the active processes to masquerade as a legitimate user to launch further attacks.\nWhat is the type of attack performed by Simon?","options":["Combinator attack","Dictionary attack","Rainbow table attack","Internal monologue attack"],"answer":"D"},{"id":107,"section":"attack/vulnerability Name","question":"Steve, an attacker, created a fake profile on a social media website and sent a request to Stella.\nStella was enthralled by Steve‵s profile picture and the description given for his profile, and she initiated a conversation with him soon after accepting the request. After a few days, Steve started asking about her company details and eventually gathered all the essential information regarding her company.\nWhat is the social engineering technique Steve employed in the above scenario?","options":["Baiting","Piggybacking","Diversion theft","Honey trap"],"answer":"D"},{"id":111,"section":"attack/vulnerability Name","question":"Johnson, an attacker, performed online research for the contact details of reputed cybersecurity firms. He found the contact number of sibertech.org and dialed the number, claiming himself to represent a technical support team from a vendor. He warned that a specific server is about to be compromised and requested sibertech.org to follow the provided instructions. Consequently, he prompted the victim to execute unusual commands and install malicious files, which were then used to collect and pass critical information to Johnson‵s machine.\nWhat is the social engineering technique Steve employed in the above scenario?","options":["Diversion theft","Quid pro quo","Elicitation","Phishing"],"answer":"B"},{"id":118,"section":"attack/vulnerability Name","question":"Mary, a penetration tester, has found password hashes in a client system she managed to breach. She needs to use these passwords to continue with the test, but she does not have time to find the passwords that correspond to these hashes.\nWhich type of attack can she implement in order to continue?","options":["Pass the hash","Internal monologue attack","LLMNR/NBT-NS poisoning","Pass the ticket"],"answer":"A"},{"id":122,"section":"attack/vulnerability Name","question":"Jane invites her friends Alice and John over for a LAN party. Alice and John access Jane’s wireless network without a password. However, Jane has a long, complex password on her router. What attack has likely occurred?","options":["Wardriving","Wireless sniffing","Evil twin","Piggybacking"],"answer":"C"},{"id":131,"section":"attack/vulnerability Name","question":"A large enterprise has been experiencing sporadic system crashes and instability, resulting in limited access to its web services. The security team suspects it could be a result of a Denial of Service (DoS) attack. A significant increase in traffic was noticed in the network logs, with patterns suggesting packet sizes exceeding the prescribed size limit. Which among the following DoS attack techniques best describes this scenario?","options":["Smurf attack","UDP flood attack","Pulse wave attack","Ping of Death attack"],"answer":"D"},{"id":298,"section":"attack/vulnerability Name","question":"**QUESTION #298\nJude, a pen tester working in Keiltech Ltd., performs sophisticated security testing on his company's network infrastructure to identify security loopholes. In this process, he started to circumvent the network protection tools and firewalls used in the company. He employed a technique that can create forged TCP sessions by carrying out multiple SYN, ACK, and RST or FIN packets. Further, this process allowed Jude to execute DDoS attacks that can exhaust the network resources.\nWhat is the attack technique used by Jude for finding loopholes in the above scenario?","options":["Spoofed session flood attack","UDP flood attack","Peer-to-peer attack","Ping-of-death attack"],"answer":"A"},{"id":133,"section":"attack/vulnerability Name","question":"Jake, a network security specialist, is trying to prevent network-level session hijacking attacks in his company. While studying different types of such attacks, he learns about a technique where an attacker inserts their machine into the communication between a client and a server, making it seem like the packets are flowing through the original path. This technique is primarily used to reroute the packets. Which of the following types of network-level session hijacking attacks is Jake studying?","options":["TCP/IP Hijacking","RST Hijacking","UDP Hijacking","Man-in-the-middle Attack Using Forged ICMP and ARP Spoofing"],"answer":"D"},{"id":170,"section":"attack/vulnerability Name","question":"A large organization is investigating a possible identity theft case where an attacker has created a new identity by combining multiple pieces of information from different victims to open a new bank account. The attacker also managed to receive government benefits using a fraudulent identity. Given the circumstances, which type of identity theft is the organization dealing with?","options":["Identity Cloning and Concealment","Child Identity Theft","Social Identity Theft","Synthetic Identity Theft"],"answer":"D"},{"id":34,"section":"attack/vulnerability Name","question":"An attacker decided to crack the passwords used by industrial control systems. In this process, he employed a loop strategy to recover these passwords. He used one character at a time to check whether the first character entered is correct; if so, he continued the loop for consecutive characters. If not, he terminated the loop. Furthermore, the attacker checked how much time the device took to finish one complete password authentication process, through which he deduced how many characters entered are correct.\nWhat is the attack technique employed by the attacker to crack the passwords of the industrial control systems?","options":["Buffer overflow attack","Side-channel attack","Denial-of-service attack","HMI-based attack"],"answer":"B"},{"id":176,"section":"attack/vulnerability Name","question":"In an advanced digital security scenario, a multinational enterprise is being targeted with a complex series of assaults aimed to disrupt operations, manipulate data integrity, and cause serious financial damage. As the Lead Cybersecurity Analyst with CEH and CISSP certifications, your responsibility is to correctly identify the specific type of attack based on the following indicators:\nThe attacks are exploiting a vulnerability in the target system's hardware, inducing misprediction of future instructions in a program's control flow. The attackers are strategically inducing the victim process to speculatively execute instructions sequences that would not have been executed in the absence of the misprediction, leading to subtle side effects. These side effects, which are observable from the shared state, are then utilized to infer the values of in-flight data.\nWhat type of attack best describes this scenario?","options":["Rowhammer Attack","Watering Hole Attack","Side-Channel Attack","Privilege Escalation Attack"],"answer":"C"},{"id":200,"section":"attack/vulnerability Name","question":"While testing a web application in development, you notice that the web server does not properly ignore the “dot dot slash” (../) character string and instead returns the file listing of a folder higher up in the folder structure of the server. What kind of attack is possible in this scenario?","options":["Cross-site scripting","SQL injection","Denial of service","Directory traversal"],"answer":"D"},{"id":208,"section":"attack/vulnerability Name","question":"**QUESTION #208\nAs a certified ethical hacker, you are performing a system hacking process for a company that is suspicious about its security system. You found that the company‵s passwords are all known words, but not in the dictionary. You know that one employee always changes the password by just adding some numbers to the old password. Which attack is most likely to succeed in this scenario?","options":["Brute-Force Attack","Password Spraying Attack","Hybrid Attack","Rule-based Attack"],"answer":"C"},{"id":209,"section":"attack/vulnerability Name","question":"A security analyst is investigating a potential network-level session hijacking incident. During the investigation, the analyst finds that the attacker has been using a technique in which they injected an authentic-looking reset packet using a spoofed source IP address and a guessed acknowledgment number. As a result, the victim's connection was reset. Which of the following hijacking techniques has the attacker most likely used?","options":["Blind hijacking","UDP hijacking","RST hijacking","TCP/IP hijacking"],"answer":"C"},{"id":246,"section":"attack/vulnerability Name","question":"John, a security analyst, is analyzing a server suspected of being compromised. The attacker has used a non admin account and has already gained a foothold on the system. John discovers that a new Dynamic Link Library is loaded in the application directory of the affected server. This DLL does not have a fully qualified path and seems to be malicious. What privilege escalation technique has the attacker likely used to compromise this server?","options":["DLL Hijacking","Named Pipe Impersonation","Spectre and Meltdown Vulnerabilities","Exploiting Misconfigured Services"],"answer":"A"},{"id":252,"section":"attack/vulnerability Name","question":"Joel, a professional hacker, targeted a company and identified the types of websites frequently visited by its employees. Using this information, he searched for possible loopholes in these websites and injected a malicious script that can redirect users from the web page and download malware onto a victim's machine. Joel waits for the victim to access the infected web application so as to compromise the victim's machine.\nWhich of the following techniques is used by Joel in the above scenario?","options":["Watering hole attack","DNS rebinding attack","MarioNet attack","Clickjacking attack"],"answer":"A"},{"id":256,"section":"attack/vulnerability Name","question":"Boney, a professional hacker, targets an organization for financial benefits. He performs an attack by sending his session ID using an MITM attack technique. Boney first obtains a valid session ID by logging into a service and later feeds the same session ID to the target employee.\nThe session ID links the target employee to Boney‵s account page without disclosing any information to the victim. When the target employee clicks on the link, all the sensitive payment details entered in a form are linked to Boney‵s account. What is the attack performed by Boney in the above scenario?","options":["Forbidden attack","CRIME attack","Session donation attack","Session fixation attack"],"answer":"C"},{"id":283,"section":"attack/vulnerability Name","question":"An attacker identified that a user and an access point are both compatible with WPA2 and WPA3 encryption. The attacker installed a rogue access point with only WPA2 compatibility in the vicinity and forced the victim to go through the WPA2 four-way handshake to get connected. After the connection was established, the attacker used automated tools to crack WPA2-encrypted messages.\nWhat is the attack performed in the above scenario?","options":["Cache-based attack","Timing-based attack","Downgrade security attack","Side-channel attack"],"answer":"C"},{"id":287,"section":"attack/vulnerability Name","question":"**QUESTION #287\nCalvin, a software developer, uses a feature that helps him auto-generate the content of a web page without manual involvement and is integrated with SSI directives. This leads to a vulnerability in the developed web application as this feature accepts remote user inputs and uses them on the page. Hackers can exploit this feature and pass malicious SSI directives as input values to perform malicious activities such as modifying and erasing server files.\nWhat is the type of injection attack Calvin's web application is susceptible to?","options":["CRLF injection","Server-side template injection","Server-side JS injection","Server-side includes injection"],"answer":"D"},{"id":289,"section":"attack/vulnerability Name","question":"Stephen, an attacker, targeted the industrial control systems of an organization. He generated a fraudulent email with a malicious attachment and sent it to employees of the target organization. An employee who manages the sales software of the operational plant opened the fraudulent email and clicked on the malicious attachment. This resulted in the malicious attachment being downloaded and malware being injected into the sales software maintained in the victim's system. Further, the malware propagated itself to other networked systems, finally damaging the industrial automation components.\nWhat is the attack technique used by Stephen to damage the industrial systems?","options":["HMI-based attack","SMishing attack","Reconnaissance attack","Spear-phishing attack"],"answer":"D"},{"id":291,"section":"attack/vulnerability Name","question":"Samuel, a security administrator, is assessing the configuration of a web server. He noticed that the server permits SSLv2 connections, and the same private key certificate is used on a different server that allows SSLv2 connections. This vulnerability makes the web server vulnerable to attacks as the SSLv2 server can leak key information.\nWhich of the following attacks can be performed by exploiting the above vulnerability?","options":["Padding oracle attack","DROWN attack","DUHK attack","Side-channel attack"],"answer":"B"},{"id":328,"section":"attack/vulnerability Name","question":"Robin, a professional hacker, targeted an organization‵s network to sniff all the traffic. During this process, Robin plugged in a rogue switch to an unused port in the LAN with a priority lower than any other switch in the network so that he could make it a root bridge that will later allow him to sniff all the traffic in the network.\nWhat is the attack performed by Robin in the above scenario?","options":["ARP spoofing attack","STP attack","DNS poisoning attack","VLAN hopping attack"],"answer":"B"},{"id":5,"section":"Key/加密方法","question":"John sends an email to his colleague Angela and wants to ensure that the message will not be changed during the delivery process. He creates a checksum of the message and encrypts it using asymmetric cryptography. What key did John use to encrypt the checksum?","options":["His own private key.","Angela's public key.","Angela's private key","His own public key."],"answer":"A"},{"id":71,"section":"Key/加密方法","question":"John wants to send Marie an email that includes sensitive information, and he does not trust the network that he is connected to. Marie gives him the idea of using PGP. What should John do to communicate correctly using this type of encryption?","options":["Use his own private key to encrypt the message.","Use his own public key to encrypt the message.","Use Marie‵s private key to encrypt the message.","Use Marie‵s public key to encrypt the message."],"answer":"D"},{"id":101,"section":"Key/加密方法","question":"Alice needs to send a confidential document to her coworker, Bryan. Their company has public key infrastructure se
