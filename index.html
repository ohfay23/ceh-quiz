t up. Therefore, Alice both encrypts the message and digitally signs it. Alice uses _______________ to encrypt the message, and Bryan uses _______________ to confirm the digital signature.","options":["Bryan‵s public key; Bryan‵s public key","Alice‵s public key; Alice‵s public key","Bryan‵s private key; Alice‵s public key","Bryan‵s public key; Alice‵s public key"],"answer":"D"},{"id":254,"section":"Key/加密方法","question":"Dorian is sending a digitally signed email to Poly. With which key is Dorian signing this message and how is Poly validating it?","options":["Dorian is signing the message with his public key, and Poly will verify that the message came from Dorian by using Dorian‵s private key.","Dorian is signing the message with Poly‵s private key, and Poly will verify that the message came from Dorian by using Dorian‵s public key.","Dorian is signing the message with his private key, and Poly will verify that the message came from Dorian by using Dorian‵s public key.","Dorian is signing the message with Poly‵s public key, and Poly will verify that the message came from Dorian by using Dorian‵s public key."],"answer":"C"},{"id":53,"section":"Key/加密方法","question":"Kevin, an encryption specialist, implemented a technique that enhances the security of keys used for encryption and authentication. Using this technique, Kevin input an initial key to an algorithm that generated an enhanced key that is resistant to brute-force attacks.\nWhat is the technique employed by Kevin to improve the security of encryption keys?","options":["Key stretching","Public key infrastructure","Key derivation function","Key reinstallation"],"answer":"A"},{"id":160,"section":"Key/加密方法","question":"**QUESTION #160\nYou are a cybersecurity professional managing cryptographic systems for a global corporation. The company uses a mix of Elliptic Curve Cryptography (ECC) for key exchange and symmetric encryption algorithms for data encryption. The time complexity of ECC key pair generation is O(n^3), where 'n' is the size of the key. An advanced threat actor group has a quantum computer that can potentially break ECC with a time complexity of O((log n)^2). Given that the ECC key size is 'n=512' and varying symmetric encryption algorithms and key sizes, which scenario would provide the best balance of security and performance?","options":["Data encryption with AES-128: Provides moderate security and fast encryption, offering a balance between the two.","Data encryption with AES-256: Provides high security with better performance than 3DES, but not as fast as other AES key sizes.","Data encryption with 3DES using a 168-bit key: Offers high security but slowerperformance due to 3DES's inherent inefficiencies.","Data encryption with Blowfish using a 448-bit key: Offers high security but potential compatibility issues due to Blowfish's less widespread use."],"answer":"B"},{"id":164,"section":"Key/加密方法","question":"**QUESTION #164\nYou are the lead cybersecurity analyst at a multinational corporation that uses a hybrid encryption system to secure inter-departmental communications. The system uses RSA encryption for key exchange and AES for data encryption, taking advantage of the strengths of both asymmetric and symmetric encryption. Each RSA key pair has a size of 'n' bits, with larger keys providing more security at the cost of slower performance. The time complexity of generating an RSA key pair is O(n^2), and AES encryption has a time complexity of O(n). An attacker has developed a quantum algorithm with time complexity O((log n)^2) to crack RSA encryption. Given 'n=4000' and variable 'AES key size', which scenario is likely to provide the best balance of security and performance?","options":["AES key size=128 bits: This configuration provides less security than option A, but RSA key generation and AES encryption will be faster.","AES key size=256 bits: This configuration provides a high level of security, but RSA key generation may be slow.","AES key size=192 bits: This configuration is a balance between options A and B, providing moderate security and performance.","AES key size=512 bits: This configuration provides the highest level of security but atasignificant performance cost due to the large AES key size."],"answer":"C"},{"id":157,"section":"Key/加密方法","question":"You are the chief security officer at AlphaTech, a tech company that specializes in data storage solutions. Your company is developing a new cloud storage platform where users can store their personal files. To ensure data security, the development team is proposing to use symmetric encryption for data at rest. However, they are unsure of how to securely manage and distribute the symmetric keys to users. Which of the following strategies would you recommend to them?","options":["Use hash functions to distribute the keys.","Use HTTPS protocol for secure key transfer.","Use digital signatures to encrypt the symmetric keys.","Implement the Diffie-Hellman protocol for secure key exchange."],"answer":"D"},{"id":234,"section":"Key/加密方法","question":"**QUESTION #234\nAs a cybersecurity consultant for SafePath Corp, you have been tasked with implementing a system for secure email communication. The key requirement is to ensure both confidentiality and non-repudiation. While considering various encryption methods, you are inclined towards using a combination of symmetric and asymmetric cryptography. However, you are unsure which cryptographic technique would best serve the purpose. Which of the following options would you choose to meet these requirements?","options":["Apply asymmetric encryption with RSA and use the private key for signing.","Use the Diffie-Hellman protocol for key exchange and encryption.","Apply asymmetric encryption with RSA and use the public key for encryption.","Use symmetric encryption with the AES algorithm."],"answer":"A"},{"id":239,"section":"Key/加密方法","question":"Your company, SecureTech Inc., is planning to transmit some sensitive data over an unsecured communication channel. As a cyber security expert, you decide to use symmetric key encryption to protect the data. However, you must also ensure the secure exchange of the symmetric key. Which of the following protocols would you recommend to the team to achieve this?","options":["Switching all data transmission to the HTTPS protocol.","Implementing SSL certificates on your company's web servers.","Utilizing SSH for secure remote logins to the servers.","Applying the Diffie-Hellman protocol to exchange the symmetric key."],"answer":"D"},{"id":262,"section":"Key/加密方法","question":"**QUESTION #262\nTony wants to integrate a 128-bit symmetric block cipher with key sizes of 128, 192, or 256 bits into a software program, which involves 32 rounds of computational operations that include substitution and permutation operations on four 32-bit word blocks using 8-variable S-boxes with 4-bit entry and 4-bit exit.\nWhich of the following algorithms includes all the above features and can be integrated by Tony into the software program?","options":["CAST-128","RC5","TEA","Serpent"],"answer":"D"},{"id":305,"section":"Key/加密方法","question":"Harper, a software engineer, is developing an email application. To ensure the confidentiality of email messages, Harper uses a symmetric-key block cipher having a classical 12- or 16-round Feistel network with a block size of 64 bits for encryption, which includes large 8 × 32-bit Sboxes (S1, S2, S3, S4) based on bent functions, modular addition and subtraction, keydependent rotation, and XOR operations. This cipher also uses a masking key (Km1) and a rotation key (Kr1) for performing its functions.\nWhat is the algorithm employed by Harper to secure the email messages?","options":["CAST-128","AES","GOST block cipher","DES"],"answer":"A"},{"id":297,"section":"Key/加密方法","question":"**QUESTION #297\nThis form of encryption algorithm is a symmetric key block cipher that is characterized by a 128-bit block size, and its key size can be up to 256 bits. Which among the following is this encryption algorithm?","options":["HMAC encryption algorithm","Twofish encryption algorithm","IDEA","Blowfish encryption algorithm"],"answer":"B"},{"id":311,"section":"Key/加密方法","question":"In this form of encryption algorithm, every individual block contains 64-bit data, and three keys are used, where each key consists of 56 bits. Which is this encryption algorithm?","options":["IDEA","Triple Data Encryption Standard","AES","MD5 encryption algorithm"],"answer":"B"},{"id":25,"section":"IOT","question":"Bob, an attacker, has managed to access a target IoT device. He employed an online tool to gather information related to the model of the IoT device and the certifications granted to it. Which of the following tools did Bob employ to gather the above information?","options":["FCC ID search","Google image search","search.com","EarthExplorer"],"answer":"A"},{"id":40,"section":"IOT","question":"John, a professional hacker, targeted CyberSol Inc., an MNC. He decided to discover the IoT devices connected in the target network that are using default credentials and are vulnerable to various hijacking attacks. For this purpose, he used an automated tool to scan the target network for specific types of IoT devices and detect whether they are using the default, factory-set credentials.\nWhat is the tool employed by John in the above scenario?","options":["IoT Inspector","AT&T IoT Platform","IoTSeeker","Azure IoT Central"],"answer":"C"},{"id":49,"section":"IOT","question":"George is a security professional working for iTech Solutions. He was tasked with securely transferring sensitive data of the organization between industrial systems. In this process, he used a short-range communication protocol based on the IEEE 203.15.4 standard. This protocol is used in devices that transfer data infrequently at a low rate in a restricted area, within a range of 10-100 m.\nWhat is the short-range wireless communication technology George employed in the above scenario?","options":["LPWAN","MQTT","NB-IoT","Zigbee"],"answer":"D"},{"id":55,"section":"IOT","question":"Robert, a professional hacker, is attempting to execute a fault injection attack on a target IoT device. In this process, he injects faults into the power supply that can be used for remote execution, also causing the skipping of key instructions. He also injects faults into the clock network used for delivering a synchronized signal across the chip.\nWhich of the following types of fault injection attack is performed by Robert in the abovescenario?","options":["Frequency/voltage tampering","Optical, electromagnetic fault injection (EMFI)","Temperature attack","Power/clock/reset glitching"],"answer":"D"},{"id":61,"section":"IOT","question":"Richard, an attacker, aimed to hack IoT devices connected to a target network. In this process, Richard recorded the frequency required to share information between connected devices. After obtaining the frequency, he captured the original data when commands were initiated by the connected devices. Once the original data were collected, he used free tools such as URH to segregate the command sequence. Subsequently, he started injecting the segregated command sequence on the same frequency into the IoT network, which repeats the captured signals of the devices.\nWhat is the type of attack performed by Richard in the above scenario?","options":["Cryptanalysis attack","Reconnaissance attack","Side-channel attack","Replay attack"],"answer":"D"},{"id":94,"section":"IOT","question":"Lewis, a professional hacker, targeted the IoT cameras and devices used by a target venturecapital firm. He used an information-gathering tool to collect information about the IoT devices connected to a network, open ports and services, and the attack surface area. Using this tool, he also generated statistical reports on broad usage patterns and trends. This tool helped Lewis continually monitor every reachable server and device on the Internet, further allowing him to exploit these devices in the network.\nWhich of the following tools was employed by Lewis in the above scenario?","options":["NeuVector","Lacework","Censys","Wapiti"],"answer":"C"},{"id":153,"section":"IOT","question":"**QUESTION #153\nAs a cybersecurity analyst at IoT Defend, you are working with a large utility company that uses Industrial Control Systems (ICS) in its operational technology (OT) environment. The company has recently integrated IoT devices into this environment to enable remote monitoring and control. They want to ensure these devices do not become a weak link in their security posture. To identify potential vulnerabilities in the IoT devices, which of the following actions should you recommend as the first step?","options":["Use stronger encryption algorithms for data transmission between IoT devices.","Implement network segmentation to isolate IoT devices from the rest of the network.","Conduct a vulnerability assessment specifically for the IoT devices.","Install the latest antivirus software on each IoT device."],"answer":"C"},{"id":155,"section":"IOT","question":"As a cybersecurity analyst at TechSafe Inc., you are working on a project to improve the security of a smart home system. This IoT-enabled system controls various aspects of the home, from heating and lighting to security cameras and door locks. Your client wants to ensure that even if one device is compromised, the rest of the system remains secure. Which of the following strategies would be most effective for this purpose?","options":["Recommend using a strong password for the smart home system's main control panel.","Suggest implementing two-factor authentication for the smart home system's mobile app.","Propose frequent system resets to clear any potential malware.","Advise using a dedicated network for the smart home system, separate from thehome's main Wi-Fi network."],"answer":"D"},{"id":175,"section":"IOT","question":"You are a cybersecurity consultant at SecureIoT Inc. A manufacturing company has contracted you to strengthen the security of their Industrial IoT (IIoT) devices used in their operational technology (OT)environment. They are concerned about potential attacks that could disrupt their production lines and compromise safety. They have an advanced firewall system in place, but you know this alone is not enough. Which of the following measures should you suggest to provide comprehensive protection for their IIoT devices?","options":["Increase the frequency of changing passwords on all IIoT devices.","Use the same encryption standards for IIoT devices as for IT devices.","Rely on the existing firewall and install antivirus software on each IIoT device.","Implement network segmentation to separate IIoT devices from the rest of the network."],"answer":"D"},{"id":138,"section":"IOT","question":"You are a cybersecurity consultant for a healthcare organization that utilizes Internet of Medical Things (IoMT) devices, such as connected insulin pumps and heart rate monitors, to provide improved patientcare. Recently, the organization has been targeted by ransomware attacks. While the IT infrastructure was unaffected due to robust security measures, they are worried that the IoMT devices could be potential entry points for future attacks. What would be your main recommendation to protect these devices from such threats?","options":["Disable all wireless connectivity on IoMT devices.","Regularly change the IP addresses of all IoMT devices.","Use network segmentation to isolate IoMT devices from the main network.","Implement multi-factor authentication for all IoMT devices."],"answer":"C"},{"id":194,"section":"IOT","question":"As a security consultant, you are advising a startup that is developing an IoT device for home security. The device communicates with a mobile app, allowing homeowners to monitor their homes in real time. The CEO is concerned about potential Man-in-the-Middle (MitM) attacks that could allow an attacker to intercept and manipulate the device's communication. Which of the following solutions would best protect against such attacks?","options":["Use CAPTCHA on the mobile app's login screen.","Implement SSL/TLS encryption for data transmission between the IoT device and the mobile app.","Limit the range of the IoT device's wireless signals.","Frequently change the IoT device's IP address."],"answer":"B"},{"id":229,"section":"IOT","question":"You are a cybersecurity consultant for a smart city project. The project involves deploying a vast network of IoT devices for public utilities like traffic control, water supply, and power grid management. The city administration is concerned about the possibility of a Distributed Denial of Service (DDoS) attack crippling these critical services. They have asked you for advice on how to prevent such an attack. What would be your primary recommendation?","options":["Implement regular firmware updates for all IoT devices.","Establish strong, unique passwords for each IoT device.","Deploy network intrusion detection systems (IDS) across the IoT network.","Implement IP address whitelisting for all IoT devices."],"answer":"D"},{"id":264,"section":"IOT","question":"Mirai malware targets IoT devices.\nAfter infiltration, it uses them to propagate and create botnets that are then used to launch which types of attack?","options":["MITM attack","Password attack","Birthday attack","DDoS attack"],"answer":"D"},{"id":32,"section":"WIFI","question":"The security team of Debry Inc. decided to upgrade Wi-Fi security to thwart attacks such as dictionary attacks and key recovery attacks. For this purpose, the security team started implementing cutting-edge technology that uses a modern key establishment protocol called the simultaneous authentication of equals (SAE), also known as dragonfly key exchange, which replaces the PSK concept.\nWhat is the Wi-Fi encryption technology implemented by Debry Inc.?","options":["WPA","WEP","WPA3","WPA2"],"answer":"C"},{"id":125,"section":"WIFI","question":"There have been concerns in your network that the wireless network component is not sufficiently secure. You perform a vulnerability scan of the wireless network and find that it is using an old encryption protocol that was designed to mimic wired encryption. What encryption protocol is being used?","options":["RADIUS","WPA","WEP","WPA3"],"answer":"C"},{"id":163,"section":"WIFI","question":"You are an ethical hacker contracted to conduct a security audit for a company. During the audit, you discover that the company's wireless network is using WEP encryption. You understand the vulnerabilities associated with WEP and plan to recommend a more secure encryption method. Which of the following would you recommend as a suitable replacement to enhance the security of the company's wireless network?","options":["Open System authentication","WPA2-PSK with AES encryption","SSID broadcast disabling","MAC address filtering"],"answer":"B"},{"id":272,"section":"WIFI","question":"Which wireless security protocol replaces the personal pre-shared key (PSK) authentication with Simultaneous Authentication of Equals (SAE) and is therefore resistant to offline dictionary attacks?","options":["Bluetooth","WPA2-Enterprise","WPA3-Personal","ZigBee"],"answer":"C"},{"id":315,"section":"WIFI","question":"This wireless security protocol allows 192-bit minimum-strength security protocols and cryptographic tools to protect sensitive data, such as GCMP-256, HMAC-SHA384, and ECDSA using a 384-bit elliptic curve.\nWhich is this wireless security protocol?","options":["WPA3-Personal","WPA3-Enterprise","WPA2-Enterprise","WPA2-Personal"],"answer":"B"},{"id":144,"section":"WIFI","question":"You are a cybersecurity consultant for a major airport that offers free Wi-Fi to travelers. The management is concerned about the possibility of \"Evil Twin\" attacks, where a malicious actor sets up a rogue access point that mimics the legitimate one. They are looking for a solution that would not significantly impact the user experience or require travelers to install additional software. What is the most effective security measure you could recommend that fits these constraints, considering the airport's unique operational environment?","options":["Regularly change the SSID of the airport's Wi-Fi network","Use MAC address filtering on the airport's Wi-Fi network","Implement WPA3 encryption for the airport's Wi-Fi network","Display a captive portal page that warns users about the possibility of Evil Twin attacks"],"answer":"D"},{"id":198,"section":"WIFI","question":"As the Chief Information Security Officer (CISO) at a large university, you are responsible for the security of a campus-wide Wi-Fi network that serves thousands of students, faculty, and staff. Recently, there has been a rise in reports of unauthorized network access, and you suspect that some users are sharing their login credentials. You are considering deploying an additional layer of security that could effectively mitigate this issue. What would be the most suitable measure to implement in this context?","options":["Implement network segmentation","Deploy a VPN for the entire campus","Enforce a policy of regularly changing Wi-Fi passwords","Implement 802.1X authentication"],"answer":"D"},{"id":89,"section":"assessment","question":"Attacker Rony installed a rogue access point within an organization‵s perimeter and attempted to intrude into its internal network. Johnson, a security auditor, identified some unusual traffic in the internal network that is aimed at cracking the authentication mechanism. He immediately turned off the targeted network and tested for any weak and outdated security mechanisms that are open to attack.\nWhat is the type of vulnerability assessment performed by Johnson in the above scenario?","options":["Wireless network assessment","Application assessment","Host-based assessment","Distributed assessment"],"answer":"A"},{"id":119,"section":"assessment","question":"**QUESTION #119\nMorris, a professional hacker, performed a vulnerability scan on a target organization by sniffing the traffic on the network to identify the active systems, network services, applications, and vulnerabilities. He also obtained the list of the users who are currently accessing the network.\nWhat is the type of vulnerability assessment that Morris performed on the target organization?","options":["Credentialed assessment","Internal assessment","External assessment","Passive assessment"],"answer":"D"},{"id":201,"section":"assessment","question":"**QUESTION #201\nA large e-commerce organization is planning to implement a vulnerability assessment solution to enhance its security posture. They require a solution that imitates the outside view of attackers, performs well-organized inference-based testing, scans automatically against continuously updated databases, and supports multiple networks. Given these requirements, which type of vulnerability assessment solution would be most appropriate?","options":["Inference-based assessment solution","Tree-based assessment approach","Product-based solution installed on a private network","Service-based solution offered by an auditing firm"],"answer":"D"},{"id":294,"section":"assessment","question":"Jude, a pen tester, examined a network from a hacker‵s perspective to identify exploits and vulnerabilities accessible to the outside world by using devices such as firewalls, routers, and servers. In this process, he also estimated the threat of network security attacks and determined the level of security of the corporate network.\nWhat is the type of vulnerability assessment that Jude performed on the organization?","options":["Application assessment","External assessment","Passive assessment","Host-based assessment"],"answer":"B"},{"id":322,"section":"assessment","question":"A newly joined employee, Janet, has been allocated an existing system used by a previous employee. Before issuing the system to Janet, it was assessed by Martin, the administrator. Martin found that there were possibilities of compromise through user directories, registries, and other system parameters. He also identified vulnerabilities such as native configuration tables, incorrect registry or file permissions, and software configuration errors. What is the type of vulnerability assessment performed by Martin?","options":["Database assessment","Host-based assessment","Credentialed assessment","Distributed assessment"],"answer":"B"},{"id":324,"section":"assessment","question":"**QUESTION #324\nAn organization is performing a vulnerability assessment for mitigating threats. James, a pen tester, scanned the organization by building an inventory of the protocols found on the organization‵s machines to detect which ports are attached to services such as an email server, a web server, or a database server. After identifying the services, he selected the vulnerabilities on each machine and started executing only the relevant tests.\nWhat is the type of vulnerability assessment solution that James employed in the above scenario?","options":["Service-based solutions","Product-based solutions","Tree-based assessment","Inference-based assessment"],"answer":"D"},{"id":110,"section":"Cyber Kill Chain","question":"At what stage of the cyber kill chain theory model does data exfiltration occur?","options":["Weaponization","Actions on objectives","Command and control","Installation"],"answer":"B"},{"id":127,"section":"Cyber Kill Chain","question":"**QUESTION #127\nIn an advanced persistent threat scenario, an adversary follows a detailed set of procedures in the cyber kill chain. During one such instance, the adversary has successfully gained access to a corporate network and now attempts to obfuscate malicious traffic within legitimate network traffic. Which of the following actions would most likely be part of the adversary's current procedures?","options":["Employing data staging techniques to collect and aggregate sensitive data.","Initiating DNS tunneling to communicate with the command-and-control server.","Establishing a command-and-control server to communicate with compromised systems.","Conducting internal reconnaissance using PowerShell scripts."],"answer":"B"},{"id":214,"section":"Cyber Kill Chain","question":"A cyber attacker has initiated a series of activities against a high-profile organization following the Cyber Kill Chain Methodology. The attacker is presently in the \"Delivery\" stage. As an Ethical Hacker, you are trying to anticipate the adversary's next move. What is the most probable subsequent action from the attacker based on the Cyber Kill Chain Methodology?","options":["The attacker will attempt to escalate privileges to gain complete control of the compromised system.","The attacker will exploit the malicious payload delivered to the target organization and establish a foothold.","The attacker will initiate an active connection to the target system to gather more data.","The attacker will start reconnaissance to gather as much information as possible about the target."],"answer":"B"},{"id":269,"section":"Cyber Kill Chain","question":"Which among the following is the best example of the third step (delivery) in the cyber kill chain?","options":["An intruder creates malware to be used as a malicious attachment to an email.","An intruder's malware is triggered when a target opens a malicious email attachment.","An intruder's malware is installed on a targets machine.","An intruder sends a malicious attachment via email to a target."],"answer":"D"},{"id":320,"section":"Cyber Kill Chain","question":"You are a penetration tester working to test the user awareness of the employees of the client XYZ. You harvested two employees’ emails from some public sources and are creating a clientside backdoor to send it to the employees via email. Which stage of the cyber kill chain are you at?","options":["Reconnaissance","Weaponization","Command and control","Exploitation"],"answer":"B"},{"id":274,"section":"未歸類","question":"?**QUESTION #274\nRoma is a member of a security team. She was tasked with protecting the internal network of an organization from imminent threats. To accomplish this task, Roma fed threat intelligence into the security devices in a digital format to block and identify inbound and outbound malicious traffic entering the organization's network.\nWhich type of threat intelligence is used by Roma to secure the internal network?","options":["Operational threat intelligence","Strategic threat intelligence","Tactical threat intelligence","Technical threat intelligence"],"answer":"D"},{"id":277,"section":"未歸類","question":"?**QUESTION #277\nLeverox Solutions hired Arnold, a security professional, for the threat intelligence process. Arnold collected information about specific threats against the organization. From this information, he retrieved contextual information about security events and incidents that helped him disclose potential risks and gain insight into attacker methodologies. He collected the information from sources such as humans, social media, and chat rooms as well as from events that resulted in cyberattacks. In this process, he also prepared a report that includes identified malicious activities, recommended courses of action, and warnings for emerging attacks.\nWhat is the type of threat intelligence collected by Arnold in the above scenario?","options":["Strategic threat intelligence","Operational threat intelligence","Technical threat intelligence","Tactical threat intelligence"],"answer":"B"},{"id":236,"section":"未歸類","question":"?**QUESTION #236\nA large multinational corporation is in the process of evaluating its security infrastructure to identify potential vulnerabilities. After a comprehensive analysis, they found multiple areas of concern, including time of check/time of use (TOC/TOU) errors, improper input handling, and poor patch management. Which of the following approaches will best help the organization mitigate the vulnerability associated with TOC/TOU errors?","options":["Regular patching of servers, firmware, operating system, and applications","Ensuring atomicity of operations between checking and using data resources","Frequently updating firewall configurations to prevent intrusion attempts","Implementing stronger encryption algorithms for all data transfers"],"answer":"B"},{"id":180,"section":"未歸類","question":"?**QUESTION #180\nDuring a reconnaissance mission, an ethical hacker uses Maltego, a popular footprinting tool, to collect information about a target organization. The information includes the target's Internet infrastructure details (domains, DNS names, Netblocks, IP address information). The hacker decides to use social engineering techniques to gain further information. Which of the following would be the least likely method of social engineering to yield beneficial information based on the data collected?","options":["Dumpster diving in the target company's trash bins for valuable printouts","Impersonating an ISP technical support agent to trick the target into providing further network details","Shoulder surfing to observe sensitive credentials input on the target‵s computers","Eavesdropping on internal corporate conversations to understand key topics"],"answer":"C"},{"id":154,"section":"未歸類","question":"?**QUESTION #154\nA penetration tester is performing an enumeration on a client's network. The tester has acquired permission to perform enumeration activities. They have identified a remote inter-process communication (IPC) share and are trying to collect more information about it. The tester decides to use a common enumeration technique to collect the desired data. Which of the following techniques would be most appropriate for this scenario?","options":["Probe the IPC share by attempting to brute force admin credentials","Brute force Active Directory","Extract usernames using email IDs","Conduct a DNS zone transfer"],"answer":"A"},{"id":39,"section":"未歸類","question":"**QUESTION #39\nClark, a professional hacker, attempted to perform a Btlejacking attack using an automated tool, Btlejack, and hardware tool, micro:bit. This attack allowed Clark to hijack, read, and export sensitive information shared between connected devices. To perform this attack, Clark executed various btlejack commands.\nWhich of the following commands was used by Clark to hijack the connections?","options":["btlejack -f 0x9c68fd30 -t -m 0x1fffffffff","btlejack -c any","btlejack -d /dev/ttyACM0 -d /dev/ttyACM2 -s","btlejack -f 0x129f3244 -j"],"answer":"A"},{"id":69,"section":"未歸類","question":"**QUESTION #69\nClark is a professional hacker. He created and configured multiple domains pointing to the same host to switch quickly between the domains and avoid detection. Identify the behavior of the adversary in the above scenario.","options":["Unspecified proxy activities","Use of command-line interface","Data staging","Use of DNS tunneling"],"answer":"A"},{"id":70,"section":"未歸類","question":"**QUESTION #70\nWhat firewall evasion scanning technique make use of a zombie system that has low network activity as well as its fragment identification numbers?","options":["Packet fragmentation scanning","Spoof source address scanning","Decoy scanning","Idle scanning"],"answer":"D"},{"id":79,"section":"未歸類","question":"**QUESTION #79\nAllen, a professional pen tester, was hired by XpertTech Solutions to perform an attack simulation on the organization‵s network resources. To perform the attack, he took advantage of the NetBIOS API and targeted the NetBIOS service. By enumerating NetBIOS, he found that port 139 was open and could see the resources that could be accessed or viewed on a remote system. He came across many NetBIOS codes during enumeration.\nIdentify the NetBIOS code used for obtaining the messenger service running for the logged-in user?","options":["<00>","<20>","<03>","<1B>"],"answer":"C"},{"id":92,"section":"未歸類","question":"**QUESTION #92\nMike, a security engineer, was recently hired by BigFox Ltd. The company recently experienced disastrous DoS attacks. The management had instructed Mike to build defensive strategies for the company's IT infrastructure to thwart DoS/DDoS attacks. Mike deployed some countermeasures to handle jamming and scrambling attacks.\nWhat is the countermeasure Mike applied to defend against jamming and scrambling attacks?","options":["Allow the transmission of all types of addressed packets at the ISP level","Disable TCP SYN cookie protection","Allow the usage of functions such as gets and strcpy","Implement cognitive radios in the physical layer"],"answer":"D"},{"id":109,"section":"未歸類","question":"**QUESTION #109\nAttacker Lauren has gained the credentials of an organization‵s internal server system, and she was often logging in during irregular times to monitor the network activities. The organization was skeptical about the login times and appointed security professional Robert to determine the issue. Robert analyzed the compromised device to find incident details such as the type of attack, its severity, target, impact, method of propagation, and vulnerabilities exploited.\nWhat is the incident handling and response (IH&R) phase, in which Robert has determined these issues?","options":["Incident triage","Preparation","Incident recording and assignment","Eradication"],"answer":"A"},{"id":129,"section":"未歸類","question":"**QUESTION #129\nA skilled ethical hacker was assigned to perform a thorough OS discovery on a potential target.\nThey decided to adopt an advanced fingerprinting technique and sent a TCP packet to an open TCP port with specific flags enabled. Upon receiving the reply, they noticed the flags were SYN and ECN-Echo. Which test did the ethical hacker conduct and why was this specific approach adopted?","options":["Test 3: The test was executed to observe the response of the target system when a packet with URC, PSH, SYN, and FIN flags was sent, thereby identifying the OS","Test 2: This test was chosen because a TCP packet with no flags enabled is known as a NULL packet and this would allow the hacker to assess the OS of the target","Test 1: The test was conducted because SYN and ECN-Echo flags enabled to allow the hacker to probe the nature of the response and subsequently determine the OS fingerprint","Test 6: The hacker selected this test because a TCP packet with the ACK flag enabled sent to a closed TCP port would yield more information about the OS"],"answer":"C"},{"id":132,"section":"未歸類","question":"**QUESTION #132\nYour company has been receiving regular alerts from its IDS about potential intrusions. On further investigation, you notice that these alerts have been false positives triggered by certain goodware files. In response, you are planning to enhance the IDS with YARA rules, reducing these false positives while improving the detection of real threats. Based on the scenario and the principles of YARA and IDS, which of the following strategies would best serve your purpose?","options":["Writing YARA rules specifically to identify the goodware files triggering false positives","Implementing YARA rules that focus solely on known malware signatures","Creating YARA rules to examine only the private database for intrusions","Incorporating YARA rules to detect patterns in all files regardless of their nature"],"answer":"A"},{"id":134,"section":"未歸類","question":"**QUESTION #134\nGiven the complexities of an organization‵s network infrastructure, a threat actor has exploited an unidentified vulnerability, leading to a major data breach. As a Certified Ethical Hacker (CEH). you are tasked with enhancing the organization's security stance. To ensure a comprehensive security defense, you recommend a certain security strategy. Which of the following best represents the strategy you would likely suggest and why?","options":["Develop an in-depth Risk Management process, involving identification, assessment, treatment, tracking, and review of risks to control the potential effects on the organization.","Establish a Defense-in-Depth strategy, incorporating multiple layers of security measures to increase the complexity and decrease the likelihood of a successful attack.","Implement an Information Assurance (IA) policy focusing on ensuring the integrity,availability, confidentiality, and authenticity of information systems.","Adopt a Continual/Adaptive Security Strategy involving ongoing prediction, prevention, detection, and response actions to ensure comprehensive computer network defense."],"answer":"D"},{"id":137,"section":"未歸類","question":"**QUESTION #137\nA malicious user has acquired a Ticket Granting Service from the domain controller using a valid user's Ticket Granting Ticket in a Kerberoasting attack. He exhorted the TGS tickets from memory for offline cracking. But the attacker was stopped before he could complete his attack. The system administrator needs to investigate and remediate the potential breach. What should be the immediate step the system administrator takes?","options":["Perform a system reboot to clear the memory","Delete the compromised user's account","Change the NTLM password hash used to encrypt the ST","Invalidate the TGS the attacker acquired"],"answer":"D"},{"id":140,"section":"未歸類","question":"**QUESTION #140\nXYZ company recently discovered a potential vulnerability on their network, originating from misconfigurations. It was found that some of their host servers had enabled debugging functions and unknown users were granted administrative permissions. As a Certified Ethical Hacker, what would be the most potent risk associated with this misconfiguration?","options":["An attacker may be able to inject a malicious DLL into the current running process","Weak encryption might be allowing man-in-the-middle attacks, leading to data tampering","Unauthorized users may perform privilege escalation using unnecessarily created accounts","An attacker may carry out a Denial-of-Service assault draining the resources of the server in the process"],"answer":"C"},{"id":142,"section":"未歸類","question":"**QUESTION #142\nAn ethical hacker is attempting to crack NTLM hashed passwords from a Windows SAM file using a rainbow table attack. He has dumped the on-disk contents of the SAM file successfully and noticed that all LM hashes are blank. Given this scenario, which of the following would be the most likely reason for the blank LM hashes?","options":["The SAM file has been encrypted using the SYSKEY function.","The passwords exceeded 14 characters in length and therefore, the LM hashes were set to a“dummy\" value.","The Windows system is Vista or a later version, where LM hashes are disabled by default.","The Windows system is using the Kerberos authentication protocol as the default method."],"answer":"C"},{"id":159,"section":"未歸類","question":"**QUESTION #159\nA certified ethical hacker is conducting a Whois footprinting activity on a specific domain. The individual is leveraging various tools such as Batch IP Converter and Whois Analyzer Pro to retrieve vital details but is unable to gather complete Whois information from the registrar for a particular set of data. As the hacker, what might be the probable data model being utilized by the domain's registrar for storing and looking up Whois information?","options":["Thin Whois model working correctly","Thin Whois model with a malfunctioning server","Thick Whois model with a malfunctioning server","Thick Whois model working correctly"],"answer":"A"},{"id":165,"section":"未歸類","question":"**QUESTION #165\nAn experienced cyber attacker has created a fake LinkedIn profile, successfully impersonating a high-ranking official from a well-established company, to execute a social engineering attack. The attacker then connected with other employees within the organization, receiving invitations to exclusive corporate events and gaining access to proprietary project details shared within the network. What advanced social engineering technique has the attacker primarily used to exploit the system and what is the most likely immediate threat to the organization?","options":["Whaling and Targeted Attacks","Pretexting and Network Vulnerability","Spear Phishing and Spam","Baiting and Involuntary Data Leakage"],"answer":"B"},{"id":167,"section":"未歸類","question":"**QUESTION #167\nA certified ethical hacker is carrying out an email footprinting exercise on a targeted organization using eMailTrackerPro. They want to map out detailed information about the recipient's activities after receiving the email. Which among the following pieces of information would NOT be directly obtained from eMailTrackerPro during this exercise?","options":["Geolocation of the recipient","Type of device used to open the email","The email accounts related to the domain of the organization","The time recipient spent reading the email"],"answer":"C"},{"id":171,"section":"未歸類","question":"**QUESTION #171\nA company recently experienced a debilitating social engineering attack that led to substantial identity theft. An inquiry found that the employee inadvertently provided critical information during an innocuous phone conversation. Considering the specific guidelines issued by the company to thwart social engineering attacks, which countermeasure would have been the most successful in averting the incident?","options":["Conduct comprehensive training sessions for employees on various social engineering methodologies and the risks associated with revealing confidential data.","Implement a well-documented change management process for modifications related to hardware or software.","Adopt a robust software policy that restricts the installation of unauthorized applications.","Reinforce physical security measures to limit access to sensitive zones within the company premises, thereby warding off unauthorized intruders."],"answer":"A"},{"id":173,"section":"未歸類","question":"**QUESTION #173\nAn ethical hacker has been tasked with assessing the security of a major corporation's network. She suspects the network uses default SNMP community strings. To exploit this, she plans to extract valuable network information using SNMP enumeration. Which tool could best help her to get the information without directly modifying any parameters within the SNMP agent‵s management information base (MIB)?","options":["SnmpWalk, with a command to change an OID to a different value","snmp-check (snmp_enum Module) to gather a wide array of information about the target","Nmap, with a script to retrieve all running SNMP processes and associated ports","OpUtils, are mainly designed for device management and not SNMP enumeration"],"answer":"B"},{"id":174,"section":"未歸類","question":"**QUESTION #174\nDuring a recent vulnerability assessment of a major corporation's IT systems, the security team identified several potential risks. They want to use a vulnerability scoring system to quantify and prioritize these vulnerabilities. They decide to use the Common Vulnerability Scoring System (CVSS). Given the characteristics of the identified vulnerabilities, which of the following statements is the most accurate regarding the metric types used by CVSS to measure these vulnerabilities?","options":["Temporal metric represents the inherent qualities of a vulnerability.","Base metric represents the inherent qualities of a vulnerability.","Temporal metric involves measuring vulnerabilities based on a specific environment or implementation.","Environmental metric involves the features that change during the lifetime of the vulnerability."],"answer":"B"},{"id":177,"section":"未歸類","question":"**QUESTION #177\nIn the process of implementing a network vulnerability assessment strategy for a tech company, the security analyst is confronted with the following scenarios:\n1) A legacy application is discovered on the network, which no longer receives updates from the vendor.\n2) Several systems in the network are found running outdated versions of web browsers prone to distributed attacks.\n3) The network firewall has been configured using default settings and passwords.\n4) Certain TCP/IP protocols used in the organization are inherently insecure.\nThe security analyst decides to use vulnerability scanning software. Which of the following limitations of vulnerability assessment should the analyst be most cautious about in this context?","options":["Vulnerability scanning software cannot define the impact of an identified vulnerability on different business operations","Vulnerability scanning software is not immune to software engineering flaws that might lead to serious vulnerabilities being missed","Vulnerability scanning software is limited in its ability to detect vulnerabilities at a given point in time","Vulnerability scanning software is limited in its ability to perform live tests on web applications to detect errors or unexpected behavior"],"answer":"A"},{"id":181,"section":"未歸類","question":"**QUESTION #181\nAn organization has been experiencing intrusion attempts despite deploying an Intrusion Detection System (IDS) and Firewalls. As a Certified Ethical Hacker, you are asked to reinforce the intrusion detection process and recommend a better rule-based approach. The IDS uses Snort rules and the new recommended tool should be able to complement it. You suggest using YARA rules with an additional tool for rule generation. Which of the following tools would be the best choice for this purpose and why?","options":["yarGen - Because it generates YARA rules from strings identified in malware files while removing strings that also appear in goodware files","Koodous - Because it combines social networking with antivirus signatures and YARA rules to detect malware","YaraRET - Because it helps in reverse engineering Trojans to generate YARA rules","AutoYara - Because it automates the generation of YARA rules from a set of malicious and benign files"],"answer":"A"},{"id":184,"section":"未歸類","question":"**QUESTION #184\nYour company suspects a potential security breach and has hired you as a Certified Ethical Hacker to investigate. You discover evidence of footprinting through search engines and advanced Google hacking techniques. The attacker utilized Google search operators to extract sensitive information. You further notice queries that indicate the use of the Google Hacking Database (CHDB) with an emphasis on VPN footprinting. Which of the following Google advanced search operators would be the LEAST useful in providing the attacker with sensitive VPN-related information?","options":["location: This operator finds information for a specific location","inurl: This operator restricts the results to only the pages containing the specified word in the URL","link: This operator searches websites or pages that contain links to the specified website or page","intitle: This operator restricts results to only the pages containing the specified term in the title"],"answer":"A"},{"id":185,"section":"未歸類","question":"**QUESTION #185\nIn a recent cyber-attack against a large corporation, an unknown adversary compromised the network and began escalating privileges and lateral movement. The security team identified that the adversary used a sophisticated set of techniques, specifically targeting zero-day vulnerabilities. As a Certified Ethical Hacker (CEH) hired to understand this attack and propose preventive measures, which of the following actions will be most crucial for your initial analysis?","options":["Identifying the specific tools used by the adversary for privilege escalation.","Analyzing the initial exploitation methods, the adversary used.","Checking the persistence mechanisms used by the adversary in compromised systems.","Investigating the data exfiltration methods used by the adversary."],"answer":"B"},{"id":206,"section":"未歸類","question":"**QUESTION #206\nAn ethical hacker is performing a network scan to evaluate the security of a company's IT infrastructure. During the scan, he discovers an active host with multiple open ports running various services. The hacker uses TCP communication flags to establish a connection with the host and starts communicating with it. He sends a SYN packet to a port on the host and receives a SYN/ACK packet back. He then sends an ACK packet for the received SYN/ACK packet, which triggers an open connection. Which of the following actions should the ethical hacker perform next?","options":["Send a PSH packet to inform the receiving application about the buffered data.","Conduct a vulnerability scan on the open port to identify any potential weaknesses.","Scan another port on the same host using the SYN, ACK, and RST flags.","Send a FIN or RST packet to close the connection."],"answer":"B"},{"id":217,"section":"未歸類","question":"**QUESTION #217\nAs part of a penetration testing team, you've discovered a web application vulnerable to CrossSite Scripting (XSS). The application sanitizes inputs against standard XSS payloads but fails to filter out HTML-encoded characters. On further analysis, you've noticed that the web application uses cookies to track session IDs. You decide to exploit the XSS vulnerability to steal users' session cookies. However, the application implements HTTPOnly cookies, complicating your original plan. Which of the following would be the most viable strategy for a successful attack?","options":["Build an XSS payload using HTML encoding and use it to exploit the server-side code, potentially disabling the HTTPOnly flag on cookies.","Develop a browser exploit to bypass the HTTPOnly restriction, then use a HTMLencoded XSS payload to retrieve the cookies.","Utilize an HTML-encoded XSS payload to trigger a buffer overflow attack, forcing the server to reveal the HTTPOnly cookies.","Create a sophisticated XSS payload that leverages HTML encoding to bypass the input sanitization, and then use it to redirect users to a malicious site where their cookies can be captured."],"answer":"D"},{"id":243,"section":"未歸類","question":"**QUESTION #243\nDuring a comprehensive security assessment, your cybersecurity team at XYZ Corp stumbles upon signs that point toward a possible Advanced Persistent Threat (APT) infiltration in the network infrastructure. These sophisticated threats often exhibit subtle indicators that distinguish them from other types of cyberattacks. To confirm your suspicion and adequately isolate the potential APT, which of the following actions should you prioritize?","options":["Investigate for anomalies in file movements or unauthorized data access attempts within your database system","Scrutinize for repeat network login attempts from unrecognized geographical regions","Vigilantly monitor for evidence of zero-day exploits that manage to evade your firewall or antivirus software","Search for proof of a spear-phishing attempt, such as the presence of malicious emails or risky attachments"],"answer":"A"},{"id":245,"section":"未歸類","question":"**QUESTION #245\nAn ethical hacker is testing a web application of a financial firm. During the test, a 'Contact Us' form's input field is found to lack proper user input validation, indicating a potential Cross-Site Scripting (XSS) vulnerability. However, the application has a stringent Content Security Policy (CSP) disallowing inline scripts and scripts from external domains but permitting scripts from its own domain. What would be the hacker's next step to confirm the XSS vulnerability?","options":["Utilize a script hosted on the application's domain to test the form","Try to disable the CSP to bypass script restrictions","Inject a benign script inline to the form to see if it executes","Load a script from an external domain to test the vulnerability"],"answer":"A"},{"id":9,"section":"未歸類","question":"Which of the following best describes code injection?","options":["Form of attack in which a malicious user inserts text into a data field interpreted as code.","Form of attack in which a malicious user inserts additional code into the JavaScript runningin the browser.","Form of attack in which a malicious user gains access to the codebase on the server and inserts new code.","Form of attack in which a malicious user gets the server to execute arbitrary code using a buffer overflow."],"answer":"A"},{"id":14,"section":"未歸類","question":"Although FTP traffic is not encrypted by default, which layer 3 protocol would allow for end-to-end encryption of the connection?","options":["SFTP","Ipsec","SSL","FTPS"],"answer":"B"},{"id":41,"section":"未歸類","question":"By performing a penetration test, you gained access under a user account. During the test, you established a connection with your own machine via the SMB service and occasionally entered your login and password in plaintext.\nWhich file do you have to clean to clear the password?","options":[".xsession-log",".profile",".bashrc",".bash_history"],"answer":"D"},{"id":44,"section":"未歸類","question":"David is a security professional working in an organization, and he is implementing a vulnerability management program in the organization to evaluate and control the risks and vulnerabilities in its IT infrastructure. He is currently executing the process of applying fixes on vulnerable systems to reduce the impact and severity of vulnerabilities. Which phase of the vulnerability-management life cycle is David currently in?","options":["Remediation","Verification","Risk assessment","Vulnerability scan"],"answer":"A"},{"id":57,"section":"未歸類","question":"Dayn, an attacker, wanted to detect if any honeypots are installed in a target network. For this purpose, he used a time-based TCP fingerprinting method to validate the response to a normal computer and the response of a honeypot to a manual SYN request.\nWhich of the following techniques is employed by Dayn to detect honeypots?","options":["Detecting honeypots running on VMware","Detecting the presence of Snort_inline honeypots","Detecting the presence of Honeyd honeypots","Detecting the presence of Sebek-based honeypots"],"answer":"C"},{"id":62,"section":"未歸類","question":"Which of the following allows attackers to draw a map or outline the target organization's network infrastructure to know about the actual environment that they are going to hack?","options":["Vulnerability analysis","Malware analysis","Scanning networks","Enumeration"],"answer":"C"},{"id":64,"section":"未歸類","question":"Susan, a software developer, wants her web API to update other applications with the latest information. For this purpose, she uses a user-defined HTTP callback or push APIs that are raised based on trigger events; when invoked, this feature supplies data to other applications so that users can instantly receive real-time information. Which of the following techniques is employed by Susan?","options":["Web shells","Webhooks","REST API","SOAP API"],"answer":"B"},{"id":73,"section":"未歸類","question":"Bill is a network administrator. He wants to eliminate unencrypted traffic inside his company‵s network. He decides to setup a SPAN port and capture all traffic to the datacenter. He immediately discovers unencrypted traffic in port UDP 161.\nWhat protocol is this port using and how can he secure that traffic?","options":["RPC and the best practice is to disable RPC completely.","SNMP and he should change it to SNMP V3.","SNMP and he should change it to SNMP V2, which is encrypted.","It is not necessary to perform any actions, as SNMP is not carrying important information."],"answer":"B"},{"id":76,"section":"未歸類","question":"Infecting a system with malware and using phishing to gain credentials to a system or web application are examples of which phase of the ethical hacking methodology?","options":["Scanning","Gaining access","Maintaining access","Reconnaissance"],"answer":"B"},{"id":77,"section":"未歸類","question":"Larry, a security professional in an organization, has noticed some abnormalities in the user accounts on a web server. To thwart evolving attacks, he decided to harden the security of the web server by adopting a few countermeasures to secure the accounts on the web server. Which of the following countermeasures must Larry implement to secure the user accounts on the web server?","options":["Retain all unused modules and application extensions.","Limit the administrator or root-level access to the minimum number of users.","Enable all non-interactive accounts that should exist but do not require interactive login.","Enable unused default user accounts created during the installation of an OS."],"answer":"B"},{"id":82,"section":"未歸類","question":"What is the common name for a vulnerability disclosure program opened by companies in platforms such as HackerOne?","options":["White-hat hacking program","Bug bounty program","Ethical hacking program","Vulnerability hunting program"],"answer":"B"},{"id":91,"section":"未歸類","question":"After an audit, the auditors inform you that there is a critical finding that you must tackle immediately. You read the audit report, and the problem is the service running on port 389. Which service is this and how can you tackle the problem?","options":["The service is NTP, and you have to change it from UDP to TCP in order to encrypt it.","The service is LDAP, and you must change it to 636, which is LDAPS.","The findings do not require immediate actions and are only suggestions.","The service is SMTP, and you must change it to SMIME, which is an encrypted way to send emails."],"answer":"B"},{"id":97,"section":"未歸類","question":"What would be the fastest way to perform content enumeration on a given web server by using the Gobuster tool?","options":["Performing content enumeration using the bruteforce mode and 10 threads","Performing content enumeration using the bruteforce mode and random file extensions","Skipping SSL certificate verification","Performing content enumeration using a wordlist"],"answer":"D"},{"id":99,"section":"未歸類","question":"Garry is a network administrator in an organization. He uses SNMP to manage networked devices from a remote location. To manage nodes in the network, he uses MIB, which contains formal descriptions of all network objects managed by SNMP. He accesses the contents of MIB by using a web browser either by entering the IP address and Lseries.mib or by entering the DNS library name and Lseries.mib. He is currently retrieving information from an MIB that contains object types for workstations and server services.\nWhich of the following types of MIB is accessed by Garry in the above scenario?","options":["LNMIB2.MIB","DHCP.MIB","MIB_II.MIB","WINS.MIB"],"answer":"A"},{"id":108,"section":"未歸類","question":"Hackers often raise the trust level of a phishing message by modeling the email to look similar to the internal email used by the target company. This includes using logos, formatting, and names of the target company. The phishing message will often use the name of the company CEO, President, or Managers. The time a hacker spends performing research to locate this information about a company is known as?","options":["Exploration","Investigation","Reconnaissance","Enumeration"],"answer":"C"},{"id":120,"section":"未歸類","question":"Which of the following protocols can be used to secure an LDAP service against anonymous queries?","options":["NTLM","RADIUS","WPA","SSO"],"answer":"A"},{"id":121,"section":"未歸類","question":"During the enumeration phase, Lawrence performs banner grabbing to obtain information such as OS details and versions of services running. The service that he enumerated runs directly on TCP port 445.\nWhich of the following services is enumerated by Lawrence in this scenario?","options":["Remote procedure call (RPC)","Telnet","Server Message Block (SMB)","Network File System (NFS)"],"answer":"C"},{"id":128,"section":"未歸類","question":"As a part of an ethical hacking exercise, an attacker is probing a target network that is suspected to employ various honeypot systems for security. The attacker needs to detect and bypass these honeypots without alerting the target. The attacker decides to utilize a suite of techniques. Which of the following techniques would NOT assist in detecting a honeypot?","options":["Implementing a brute force attack to verify system vulnerability","Probing system services and observing the three-way handshake","Using honeypot detection tools like Send-Safe Honeypot Hunter","Analyzing the MAC address to detect instances running on VMware"],"answer":"A"},{"id":143,"section":"未歸類","question":"A Certified Ethical Hacker (CEH) is given the task to perform an LDAP enumeration on a target system. The system is secured and accepts connections only on secure LDAP. The CEH uses Python for the enumeration process. After successfully installing LDAP and establishing a connection with the target, he attempts to fetch details like the domain name and naming context but is unable to receive the expected response. Considering the circumstances, which of the following is the most plausible reason for this situation?","options":["The system failed to establish a connection due to an incorrect port number.","The enumeration process was blocked by the target system's intrusion detections","The secure LDAP connection was not properly initialized due to a lack of 'use_ssl = True' in the server object creation.","The Python version installed on the CEH's machine is incompatible with the Idap3 library."],"answer":"C"},{"id":145,"section":"未歸類","question":"As a Certified Ethical Hacker, you are conducting a footprinting and reconnaissance operation against a target organization. You discover a range of IP addresses associated with the target using the SecurityTrails tool. Now, you need to perform a reverse DNS lookup on these IP addresses to find the associated domain names, as well as determine the nameservers and mail exchange (MX) records. Which of the following DNSRecon commands would be most effective for this purpose?","options":["dnsrecon -r 192.168.1.0/24 -n nsl.example.com -t axfr","dnsrecon -r 10.0.0.0/24 -n nsl.example.com -t zonewalk","dnsrecon -r 162.241.216.0/24 -n nsl.example.com -t std","dnsrecon -r 162.241.216.0/24 -d example.com -t brt"],"answer":"C"},{"id":146,"section":"未歸類","question":"You are an ethical hacker tasked with conducting an enumeration of a company's network. Given a Windows Answered Marked for Review 37.6% system with NetBIOS enabled, port 139 open, and file and printer sharing active, you are about to run some nbtstat commands to enumerate NetBIOS names. The company uses IPv6 for its network. Which of the following actions should you take next?","options":["Switch to an enumeration tool that supports IPv6","Use nbtstat -a followed by the IPv6 address of the target machine","Use nbtstat -c to get the contents of the NetBIOS name cache","Utilize Nmap Scripting Engine (NSE) for NetBIOS enumeration"],"answer":"A"},{"id":148,"section":"未歸類","question":"A large corporation is planning to implement preventive measures to counter a broad range of social engineering techniques. The organization has implemented a signature-based IDS, intrusion detection system, to detect known attack payloads and network flow analysis to monitor data entering and leaving the network. The organization is deliberating on the next step. Considering the information provided about various social engineering techniques, what should be the organization's next course of action?","options":["Implement endpoint detection and response solution to oversee endpoint activities","Set up a honeypot to attract potential attackers into a controlled environment foranalysis","Deploy more security personnel to physically monitor key points of access","Organize regular employee awareness training regarding social engineering techniques and preventive measures"],"answer":"D"},{"id":151,"section":"未歸類","question":"Recently, the employees of a company have been receiving emails that seem to be from their colleagues, but with suspicious attachments. When opened, these attachments appear to install malware on their systems. The IT department suspects that this is a targeted malware attack. Which of the following measures would be the most effective in preventing such attacks?","options":["Disabling Autorun functionality on all drives","Avoiding the use of outdated web browsers and email software","Regularly scan systems for any new files and examine them","Applying the latest patches and updating software programs"],"answer":"D"},{"id":152,"section":"未歸類","question":"A network security analyst, while conducting penetration testing, is aiming to identify a service account password using the Kerberos authentication protocol. They have a valid user authentication ticket (TGT) and decided to carry out a Kerberoasting attack. In the scenario described, which of the following steps should the analyst take next?","options":["Carry out a passive wire sniffing operation using Internet packet sniffers","Perform a PRobability INfinite Chained Elements (PRINCE) attack","Extract plaintext passwords, hashes, PIN codes, and Kerberos tickets using a tool like Mimikatz","Request a service ticket for the service principal name of the target service account"],"answer":"D"},{"id":168,"section":"未歸類","question":"You are a cybersecurity trainee tasked with securing a small home network. The homeowner is concerned about potential \"Wi-Fi eavesdropping,\" where unauthorized individuals could intercept the wireless communications. What would be the most effective first step to mitigate this risk, considering the simplicity and the residential nature of the network?","options":["Disable the network's SSID broadcast","Enable encryption on the wireless network","Enable MAC address filtering","Reduce the signal strength of the wireless router"],"answer":"B"},{"id":169,"section":"未歸類","question":"A well-resourced attacker intends to launch a highly disruptive DDoS attack against a major online retailer. The attacker aims to exhaust all the network resources while keeping their identity concealed. Their method should be resistant to simple defensive measures such as IPbased blocking. Based on these objectives, which of the following attack strategies would be most effective?","options":["The attacker should instigate a protocol-based SYN flood attack, consuming connection state tables on the retailer's servers","The attacker should leverage a botnet to launch a Pulse Wave attack, sending highvolume traffic pulses at regular intervals","The attacker should initiate a volumetric flood attack using a single compromised machine to overwhelm the retailer's network bandwidth","The attacker should execute a simple ICMP flood attack from a single IP, exploitingthe retailer's ICMP processing"],"answer":"B"},{"id":172,"section":"未歸類","question":"An IT company has just implemented new security controls to their network and system setup. As a Certified Ethical Hacker, your responsibility is to assess the possible vulnerabilities in the new setup. You are given the information that the network and system are adequately patched with the latest updates, and all employees have gone through recent cybersecurity awareness training. Considering the potential vulnerability sources, what is the best initial approach to vulnerability assessment?","options":["Conducting social engineering tests to check if employees can be tricked into revealing sensitive information","Checking for hardware and software misconfigurations to identify any possible loopholes","Evaluating the network for inherent technology weaknesses prone to specific types of attacks","Investigating if any ex-employees still have access to the company's system and data"],"answer":"B"},{"id":188,"section":"未歸類","question":"A penetration tester was assigned to scan a large network range to find live hosts. The network is known for using strict TCP filtering rules on its firewall, which may obstruct common host discovery techniques. The tester needs a method that can bypass these firewall restrictions and accurately identify live systems. What host discovery technique should the tester use?","options":["ICMP Timestamp Ping Scan","ICMP ECHO Ping Scan","TCP SYN Ping Scan","UDP Ping Scan"],"answer":"D"},{"id":224,"section":"未歸類","question":"An ethical hacker is preparing to scan a network to identify live systems. To increase the efficiency and accuracy of his scans, he is considering several different host discovery techniques. He expects several unused IP addresses at any given time, specifically within the private address range of the LAN, but he also anticipates the presence of restrictive firewalls that may conceal active devices. Which scanning method would be most effective in this situation?","options":["ICMP ECHO Ping Sweep","ICMP Timestamp Ping","TCP SYN Ping","ARP Ping Scan"],"answer":"D"},{"id":223,"section":"未歸類","question":"A Certified Ethical Hacker is attempting to gather information about a target organization's network structure through network footprinting. During the operation, they encounter ICMP blocking by the target system's firewall. The hacker wants to ascertain the path that packets take to the host system from a source, using an alternative protocol. Which of the following actions should the hacker consider next?","options":["Use UDP Traceroute in the Linux operating system by executing the 'traceroute' command with the destination IP or domain name.","Use the ICMP Traceroute on the Windows operating system as it is the default utility.","Use the ARIN Whois database search tool to find the network range of the target network.","Utilize the Path Analyzer Pro to trace the route from the source to the destination target systems."],"answer":"A"},{"id":199,"section":"未歸類","question":"An ethical hacker is scanning a target network. They initiate a TCP connection by sending an SYN packet to a target machine and receiving a SYN/ACK packet in response. But instead of completing the three-way handshake with an ACK packet, they send an RST packet. What kind of scan is the ethical hacker likely performing and what is their goal?","options":["They are performing an SYN scan to stealthily identify open ports without fully establishing a connection.","They are performing a network scan to identify live hosts and their IP addresses.","They are performing a TCP connect scan to identify open ports on the target machine.","They are performing a vulnerability scan to identify any weaknesses in the target system."],"answer":"A"},{"id":207,"section":"未歸類","question":"A multinational corporation's computer system was infiltrated by an advanced persistent threat (APT). During forensic analysis, it was discovered that the malware was utilizing a blend of two highly sophisticated techniques to stay undetected and continue its operations.\nFirstly, the malware was embedding its harmful code into the actual binary or executable part of genuine system files rather than appending or prepending itself to the files. This made it exceptionally difficult to detect and eradicate, as doing so risked damaging the system files themselves.\nSecondly, the malware exhibited characteristics of a type of malware that changes its code as it propagates, making signature-based detection approaches nearly impossible.\nOn top of these, the malware maintained a persistent presence by installing itself in the registry, making it able to survive system reboots.\nGiven these distinctive characteristics, which two types of malware techniques does this malware most closely embody?","options":["Polymorphic and Metamorphic malware","Polymorphic and Macro malware","Macro and Rootkit malware","Metamorphic and Rootkit malware"],"answer":"D"},{"id":212,"section":"未歸類","question":"A large corporate network is being subjected to repeated sniffing attacks. To increase security, the company's IT department decides to implement a combination of several security measures. They permanently add the MAC address of the gateway to the ARP cache, switch to using IPv6 instead of IPv4, implement the use of encrypted sessions such as SSH instead of Telnet, and use Secure File Transfer Protocol instead of FTP. However, they are still faced with the threat of sniffing. Considering the countermeasures, what should be their next step to enhance network security?","options":["Use HTTP instead of HTTPS for protecting usernames and passwords","Implement network scanning and monitoring tools","Enable network identification broadcasts","Retrieve MAC addresses from the OS"],"answer":"B"},{"id":228,"section":"未歸類","question":"In a large organization, a network security analyst discovered a series of packet captures that seem unusual. The network operates on a switched Ethernet environment. The security team suspects that an attacker might be using a sniffer tool. Which technique could the attacker be using to successfully carry out this attack, considering the switched nature of the network?","options":["The attacker might be compromising physical security to plug into the network directly.","The attacker might be implementing MAC flooding to overwhelm the switch's memory.","The attacker is probably using a Trojan horse with in-built sniffing capability.","The attacker might be using passive sniffing, as it provides significant stealth advantages."],"answer":"B"},{"id":241,"section":"未歸類","question":"During a penetration test, an ethical hacker is exploring the security of a complex web application. The application heavily relies on JavaScript for client-side input sanitization, with an apparent assumption that this alone is adequate to prevent injection attacks. During the investigation, the ethical hacker also notices that the application utilizes cookies to manage user sessions but does not enable the HttpOnly flag. This lack of flag potentially exposes the cookies to client-side scripts. Given these identified vulnerabilities, what would be the most effective strategy for the ethical hacker to exploit this application?","options":["Instigate a Distributed Denial of Service (DDoS) attack to overload the server, capitalizing on potential weak server-side security.","Implement an SQL Injection attack to take advantage of potential unvalidated input and gain unauthorized database access.","Employ a brute-force attack to decipher user credentials, considering the lack of server-side validation.","Launch a Cross-Site Scripting (XSS) attack, aiming to bypass the client-side sanitization and exploit the exposure of session cookies."],"answer":"D"},{"id":15,"section":"???","question":"What is not a PCI compliance recommendation?","options":["Use a firewall between the public network and the payment card data.","Use encryption to protect all transmission of card holder data over any public network.","Rotate employees handling credit card transactions on a yearly basis to different departments.","Limit access to card holder data to as few individuals as possible."],"answer":"C"},{"id":3,"section":"???","question":"NIST defines risk management as the process of identifying, assessing, and controlling threats to an organization's capital and earnings. But what is the \"risk\" itself?","options":["Weakness in an information system, system security procedures, internal controls, or implementation that could be exploited or triggered by a threat source.","An occurrence that actually or potentially jeopardizes the confidentiality, integrity, or availability of an information system.","The unauthorized disclosure, modification, or use of sensitive data.","Potential that a threat will exploit vulnerabilities of an asset or group of assets."],"answer":"D"},{"id":10,"section":"???","question":"Identify a security policy that defines using of a VPN for gaining access to an internal corporate network?","options":["Information protection policy","Access control policy","Network security policy","Remote access policy"],"answer":"D"},{"id":16,"section":"???","question":"What  is the minimum number of network connections in a multihomed firewall?","options":["3","5","4","2"],"answer":"D"},{"id":20,"section":"???","question":"What is the role of test automation in security testing?","options":["It is an option but it tends to be very expensive.","It should be used exclusively. Manual testing is outdated because of low speed and possible test setup inconsistencies.","Test automation is not usable in security due to the complexity of the tests.","It can accelerate benchmark tests and repeat them with a consistent test setup. But it cannot replace manual testing completely."],"answer":"D"},{"id":35,"section":"???","question":"Given below are different steps involved in the vulnerability-management life cycle.\n1)Remediation\n2)Identify assets and create a baseline\n3)Verification\n4)Monitor\n5)Vulnerability scan\n6)Risk assessment\nIdentify the correct sequence of steps involved in vulnerability management.","options":["2→5 → 6 → 1 → 3 → 4","2→4 → 5 → 3 → 6 → 1","2→1 → 5 → 6 → 4 → 3","1→2 → 3 → 4 → 5 → 6"],"answer":"A"},{"id":46,"section":"???","question":"Judy created a forum. One day, she discovers that a user is posting strange images without writing comments. She immediately calls a security expert, who discovers that the following code is hidden behind those images:\nWhat issue occurred for the users who clicked on the image?","options":["This php file silently executes the code and grabs the user‵s session cookie and session ID.","The code redirects the user to another site.","The code injects a new cookie to the browser.","The code is a virus that is attempting to gather the user‵s username and password."],"answer":"A"},{"id":63,"section":"???","question":"Your company was hired by a small healthcare provider to perform a technical assessment on the network. What is the best approach for discovering vulner
