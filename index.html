abilities on a Windows-based computer?","options":["Use the built-in Windows Update tool","Use a scan tool like Nessus","Check MITRE.org for the latest list of CVE findings","Create a disk image of a clean Windows installation"],"answer":"B"},{"id":93,"section":"???","question":"You are using a public Wi-Fi network inside a coffee shop. Before surfing the web, you use your VPN to prevent intruders from sniffing your traffic.\nIf you did not have a VPN, how would you identify whether someone is performing an ARP spoofing attack on your laptop?","options":["You should check your ARP table and see if there is one IP address with two different MAC addresses.","You should scan the network using Nmap to check the MAC addresses of all the hosts and look for duplicates.","You should use netstat to check for any suspicious connections with another IP address within the LAN.","You cannot identify such an attack and must use a VPN to protect your traffic."],"answer":"A"},{"id":98,"section":"???","question":"When analyzing the IDS logs, the system administrator noticed an alert was logged when the external router was accessed from the administrator‵s Computer to update the router configuration.\nWhat type of an alert is this?","options":["False negative","True negative","True positive","False positive"],"answer":"D"},{"id":156,"section":"???","question":"During your summer internship at a tech company, you have been asked to review the security settings of their web server. While inspecting, you notice the server reveals detailed error messages to users, including database query errors and internal server errors. As a cybersecurity beginner, what is your understanding of this setting, and how would you advise the company?","options":["Retain the setting as it aids in troubleshooting user issues.","Suppress detailed error messages, as they can expose sensitive information.","Implement stronger encryption to secure the error messages.","Increase the frequency of automated server backups."],"answer":"B"},{"id":178,"section":"???","question":"In your cybersecurity class, you are learning about common security risks associated with web servers. One topic that comes up is the risk posed by using default server settings. Why is using default settings on a web server considered a security risk, and what would be the best initial step to mitigate this risk?","options":["Default settings allow unlimited login attempts; setup account lockout","Default settings reveal server software type; change these settings","Default settings cause server malfunctions; simplify the settings","Default settings enable auto-updates; disable and manually patch"],"answer":"B"},{"id":150,"section":"???","question":"A large organization has recently performed a vulnerability assessment using Nessus Professional, and the security team is now preparing the final report. They have identified a high-risk vulnerability, named XYZ, which could potentially allow unauthorized access to the network. In preparing the report, which of the following elements would NOT be typically included in the detailed documentation for this specific vulnerability?","options":["Proof of concept (PoC) of the vulnerability, if possible, to demonstrate its potential impact on the system.","The total number of high, medium, and low-risk vulnerabilities detected throughout the network.","The list of all affected systems within the organization that are susceptible to the identified vulnerability.","The CVE ID of the vulnerability and its mapping to the vulnerability's name, XYZ."],"answer":"B"},{"id":186,"section":"???","question":"Jason, a certified ethical hacker, is hired by a major e-commerce company to evaluate their network's security. As part of his reconnaissance, Jason is trying to gain as much information as possible about the company's public-facing servers without arousing suspicion. His goal is to find potential points of entry and map out the network infrastructure for further examination. Which technique should Jason employ to gather this information without alerting the company's intrusion detection systems (IDS)?","options":["Jason should directly connect to each server and attempt to exploit known vulnerabilities.","Jason should use passive reconnaissance techniques such as WHOIS lookups, NS lookups, and web research.","Jason should use a DNS zone transfer to gather information about the company's servers.","Jason should perform a ping sweep to identify all the live hosts in the company's IP range."],"answer":"B"},{"id":191,"section":"???","question":"Sarah, a system administrator, was alerted of potential malicious activity on the network of her company. She discovered a malicious program spread through the instant messenger application used by her team. The attacker had obtained access to one of her teammate's messenger accounts and started sending files across the contact list. Which best describes the attack scenario and what measure could have prevented it?","options":["Insecure Patch Management; updating application software regularly","Instant Messenger Applications; verifying the sender's identity before opening any files","Rogue/Decoy Applications; ensuring software is labeled as TRUSTED","Portable Hardware Media/Removable Devices; disabling Autorun functionality"],"answer":"B"},{"id":192,"section":"???","question":"A multinational organization has recently faced a severe information security breach.\nInvestigations reveal that the attacker had a high degree of understanding of the organization‵s internal processes and systems. This knowledge was utilized to bypass security controls and corrupt valuable resources. Considering this event, the security team is contemplating the type of attack that occurred and the steps they could have taken to prevent it. Choose the most plausible type of attack and a countermeasure that the organization could have employed:","options":["Insider attacks and the organization should have implemented robust access control and monitoring.","Distribution attack and the organization could have ensured software and hardware integrity checks.","Passive attack and the organization should have used encryption techniques.","Active attack and the organization could have used network traffic analysis."],"answer":"A"},{"id":196,"section":"???","question":"You have been given the responsibility to ensure the security of your school's web server. As a step towards this, you plan to restrict unnecessary services running on the server. In the context of web server security, why is this step considered important?","options":["Unnecessary services eat up server memory; save memory resources.","Unnecessary services could contain vulnerabilities; minimize the attack surface.","Unnecessary services reveal server software; hide software details.","Unnecessary services slow down the server; optimize server speed."],"answer":"B"},{"id":219,"section":"???","question":"You have been hired as an intern at a start-up company. Your first task is to help set up a basic web server for the company's new website. The team leader has asked you to make sure the server is secure from common threats. Based on your knowledge from studying for the CEH exam, which of the following actions should be your priority to secure the web server?","options":["Limiting the number of concurrent connections to the server","Installing a web application firewall","Regularly updating and patching the server software","Encrypting the company's website with SSL/TLS"],"answer":"C"},{"id":221,"section":"???","question":"An IT security team is conducting an internal review of security protocols in their organization to identify potential vulnerabilities. During their investigation, they encounter a suspicious program running on several computers. Further examination reveals that the program has been logging all user keystrokes. How can the security team confirm the type of program and what countermeasures should be taken to ensure the same attack does not occur in the future?","options":["The program is spyware; the team should use password managers and encrypt sensitive data.","The program is a keylogger; the team should employ intrusion detection systems and regularly update the system software.","The program is a keylogger; the team should educate employees about phishing attacks and maintain regular backups.","The program is a Trojan; the team should regularly update antivirus software and install a reliable firewall."],"answer":"B"},{"id":211,"section":"???","question":"As a certified ethical hacker, you are tasked with gaining information about an enterprise's internal network. You are permitted to test the network's security using enumeration techniques. You successfully obtain a list of usernames using email IDs and execute a DNS Zone Transfer. Which enumeration technique would be most effective for your next move given that you have identified open TCP ports 25 (SMTP) and 139 (NetBIOS Session Service)?","options":["Perform a brute force attack on Microsoft Active Directory to extract valid usernames","Exploit the NetBIOS Session Service on TCP port 139 to gain unauthorized access to the file system","Use SNMP to extract usernames given the community strings","Exploit the NFS protocol on TCP port 2049 to gain control over a remote system"],"answer":"B"},{"id":215,"section":"???","question":"You are a cloud security expert at CloudGuard Inc. working with a client who plans to transition their infrastructure to a public cloud. The client expresses concern about potential data breaches and wants to ensure that only authorized personnel can access certain sensitive resources. You propose implementing a Zero Trust security model. Which of the following best describes how the Zero Trust model would enhance the security of their cloud resources?","options":["It operates on the principle of least privilege, verifying each request as if it is from an untrusted source, regardless of its  information to perform social engineering. Which of the following design flaws in the authentication mechanism is exploited by Calvin?","options":["User impersonation","Insecure transmission of credentials","Password reset mechanism","Verbose failure messages"],"answer":"D"},{"id":271,"section":"???","question":"Rebecca, a security professional, wants to authenticate employees who use web services for safe and secure communication. In this process, she employs a component of the Web Service Architecture, which is an extension of SOAP, and it can maintain the integrity and confidentiality of SOAP messages.\nWhich of the following components of the Web Service Architecture is used by Rebecca for securing the communication?","options":["WS-Work Processes","WS-Security","WS-Policy","WSDL"],"answer":"B"},{"id":273,"section":"???","question":"Sam, a web developer, was instructed to incorporate a hybrid encryption software program into a web application to secure email messages. Sam used an encryption software, which is a free implementation of the OpenPGP standard that uses both symmetric-key cryptography and asymmetric-key cryptography for improved speed and secure key exchange.\nWhat is the encryption software employed by Sam for securing the email messages?","options":["PGP","SMTP","GPG","S/MIME"],"answer":"C"},{"id":292,"section":"???","question":"Clark, a professional hacker, was hired by an organization to gather sensitive information about its competitors surreptitiously. Clark gathers the server IP address of the target organization using Whois footprinting. Further, he entered the server IP address as an input to an online tool to retrieve information such as the network range of the target organization and to identify the network topology and operating system used in the network. What is the online tool employed by Clark in the above scenario?","options":["DuckDuckGo","AOL","ARIN","Baidu"],"answer":"C"},{"id":302,"section":"???","question":"Which is the first step followed by Vulnerability Scanners for scanning a network?","options":["OS Detection","Firewall detection","TCP/UDP Port scanning","Checking if the remote host is alive"],"answer":"D"},{"id":304,"section":"???","question":"A \"Server-Side Includes\" attack refers to the exploitation of a web application by injecting scripts in HTML pages or executing arbitrary code remotely.\nWhich web-page file type, if it exists on the web server, is a strong indication that the server is vulnerable to this kind of attack?","options":[".stm",".cms",".rss",".html"],"answer":"A"},{"id":306,"section":"???","question":"Ron, a security professional, was pen testing web applications and SaaS platforms used by his company. While testing, he found a vulnerability that allows hackers to gain unauthorized access to API objects and perform actions such as view, update, and delete sensitive data of the company.\nWhat is the API vulnerability revealed in the above scenario?","options":["No ABAC validation","Business logic flaws","Improper use of CORS","Code injections"],"answer":"A"},{"id":307,"section":"???","question":"Louis, a professional hacker, had used specialized tools or search engines to encrypt all his browsing activity and navigate anonymously to obtain sensitive/hidden information about official government or federal databases. After gathering the information, he successfully performed an attack on the target government organization without being traced.\nWhich of the following techniques is described in the above scenario?","options":["Website footprinting","Dark web footprinting","VPN footprinting","VoIP footprinting"],"answer":"B"},{"id":318,"section":"???","question":"Tony is a penetration tester tasked with performing a penetration test. After gaining initial access to a target system, he finds a list of hashed passwords.\nWhich of the following tools would not be useful for cracking the hashed passwords?","options":["Hashcat","John the Ripper","THC-Hydra","netcat"],"answer":"D"},{"id":327,"section":"???","question":"Harry, a professional hacker, targets the IT infrastructure of an organization. After preparing for the attack, he attempts to enter the target network using techniques such as sending spearphishing emails and exploiting vulnerabilities on publicly available servers. Using these techniques, he successfully deployed malware on the target system to establish an outbound connection.\nWhat is the APT lifecycle phase that Harry is currently executing?","options":["Initial intrusion","Persistence","Cleanup","Preparation"],"answer":"A"},{"id":329,"section":"???","question":"Nathan is testing some of his network devices. Nathan is using Macof to try and flood the ARP cache of these switches.\nIf these switches' ARP cache is successfully flooded, what will be the result?","options":["The switches will drop into hub mode if the ARP cache is successfully flooded.","If the ARP cache is flooded, the switches will drop into pix mode making it less susceptible to attacks.","Depending on the switch manufacturer, the device will either delete every entry in its ARP cache or reroute packets to the nearest switch.","The switches will route all traffic to the broadcast address created collisions."],"answer":"A"},{"id":4,"section":"???","question":"You need to hide the file in the Linux system. Which of the following characters will you type at the beginning of the filename?","options":["_ (Underscore)",". (Period)","! (Exclamation mark)","~ (Tilda)"],"answer":"B"},{"id":13,"section":"???","question":"Which of the following programs is usually targeted at Microsoft Office products?","options":["Polymorphic virus","Multipart virus","Macro virus","Stealth virus"],"answer":"C"},{"id":26,"section":"???","question":"What piece of hardware on a computer‵s motherboard generates encryption keys and only releases a part of the key so that decrypting a disk on a new piece of hardware is not possible?","options":["CPU","UEFI","GPU","TPM"],"answer":"D"},{"id":27,"section":"???","question":"Gilbert, a web developer, uses a centralized web API to reduce complexity and increase the integrity of updating and changing data. For this purpose, he uses a web service that uses HTTP methods such as PUT, POST, GET, and DELETE and can improve the overall performance, visibility, scalability, reliability, and portability of an application.\nWhat is the type of web-service API mentioned in the above scenario?","options":["RESTful API","JSON-RPC","SOAP API","REST API"],"answer":"A"},{"id":29,"section":"???","question":"Nicolas just found a vulnerability on a public-facing system that is considered a zero-day vulnerability. He sent an email to the owner of the public system describing the problem and how the owner can protect themselves from that vulnerability. He also sent an email to Microsoft informing them of the problem that their systems are exposed to. What type of hacker is Nicolas?","options":["Black hat","White hat","Gray hat","Red hat"],"answer":"C"},{"id":31,"section":"???","question":"A penetration tester is performing the footprinting process and is reviewing publicly available information about an organization by using the Google search engine.\nWhich of the following advanced operators would allow the pen tester to restrict the search to the organization‵s web domain?","options":["[allinurl:]","[location:]","[site:]","[link:]"],"answer":"C"},{"id":319,"section":"???","question":"Which of the following Google advanced search operators helps an attacker in gathering information about websites that are similar to a specified target URL?","options":["[inurl:]","[info:]","[site:]","[related:]"],"answer":"D"},{"id":65,"section":"???","question":"Which IOS jailbreaking technique patches the kernel during the device boot so that it becomes jailbroken after each successive reboot?","options":["Tethered jailbreaking","Semi-untethered jailbreaking","Semi-tethered jailbreaking","Untethered jailbreaking"],"answer":"D"},{"id":68,"section":"???","question":"What is the port to block first in case you are suspicious that an IoT device has been compromised?","options":["22","48101","80","443"],"answer":"B"},{"id":72,"section":"???","question":"In the Common Vulnerability Scoring System (CVSS) v3.1 severity ratings, what range does medium vulnerability fall in?","options":["4.0-6.0","3.9-6.9","3.0-6.9","4.0-6.9"],"answer":"D"},{"id":75,"section":"???","question":"Bob was recently hired by a medical company after it experienced a major cyber security breach. Many patients are complaining that their personal medical records are fully exposed on the Internet and someone can find them with a simple Google search. Bob‵s boss is very worried because of regulations that protect those data.\nWhich of the following regulations is mostly violated?","options":["PCI DSS","PII","ISO 2002","HIPPA/PHI"],"answer":"D"},{"id":86,"section":"???","question":"Henry is a cyber security specialist hired by BlackEye – Cyber Security Solutions. He was tasked with discovering the operating system (OS) of a host. He used the Unicornscan tool to discover the OS of the target system. As a result, he obtained a TTL value, which indicates that the target system is running a Windows OS.\nIdentify the TTL value Henry obtained, which indicates that the target OS is Windows.","options":["128","255","64","138"],"answer":"A"},{"id":100,"section":"???","question":"In the process of setting up a lab for malware analysis, a cybersecurity analyst is tasked to establish a secure environment using a sheep dip computer. The analyst must prepare the testbed while adhering to best practices. Which of the following steps should the analyst avoid when configuring the environment?","options":["Installing malware analysis tools on the guest OS","Connecting the system to the production network during the malware analysis","Simulating Internet services using tools such as INetSim","Installing multiple guest operating systems on the virtual machine(s)"],"answer":"B"},{"id":102,"section":"???","question":"What is the file that determines the basic configuration (specifically activities, services, broadcast receivers, etc.) in an Android application?","options":["AndroidManifest.xml","classes.dex","APK.info","resources.asrc"],"answer":"A"},{"id":105,"section":"???","question":"While browsing his Facebook feed, Matt sees a picture one of his friends posted with the caption, “Learn more about your friends!”, as well as a number of personal QUESTIONs. Matt is suspicious and texts his friend, who confirms that he did indeed post it. With assurance that the post is legitimate, Matt responds to the QUESTIONs on the post. A few days later, Matt‵s bank account has been accessed, and the password has been changed. What most likely happened?","options":["Matt inadvertently provided the answers to his security QUESTIONs when responding to the post.","Matt inadvertently provided his password when responding to the post.","Matt‵s computer was infected with a keylogger.","Matt‵s bank-account login information was brute forced."],"answer":"A"},{"id":123,"section":"???","question":"Which file is a rich target to discover the structure of a website during web-server footprinting?","options":["domain.txt","Robots.txt","Document root","index.html"],"answer":"B"},{"id":139,"section":"???","question":"You are a cybersecurity consultant for a global organization. The organization has adopted a Bring Your Own Device (BYOD)policy, but they have recently experienced a phishing incident where an employee's device was compromised. In the investigation, you discovered that the phishing attack occurred through a third-party email app that the employee had installed. Given the need to balance security and user autonomy under the BYOD policy, how should the organization mitigate the risk of such incidents? Moreover, consider a measure that would prevent similar attacks without overly restricting the use of personal devices.","options":["Provide employees with corporate-owned devices for work-related tasks.","Require all employee devices to use a company-provided VPN for internet access.","Implement a mobile device management solution that restricts the installation of nonapproved applications.","Conduct regular cybersecurity awareness training, focusing on phishing attacks."],"answer":"C"},{"id":141,"section":"???","question":"An organization suspects a persistent threat from a cybercriminal. They hire an ethical hacker, John, to evaluate their system security. John identifies several vulnerabilities and advises the organization on preventive measures. However, the organization has limited resources and opts to fix only the most severe vulnerability. Subsequently, a data breach occurs exploiting a different vulnerability. Which of the following statements best describes this scenario?","options":["The organization is at fault because it did not fix all identified vulnerabilities.","Both the organization and John share responsibility because they did not adequately manage the vulnerabilities.","John is at fault because he did not emphasize the necessity of patching all vulnerabilities.","The organization is not at fault because they used their resources as per their understanding."],"answer":"B"},{"id":166,"section":"???","question":"As a cybersecurity analyst for a large corporation, you are auditing the company's mobile device management (MDM) policy. One of your areas of concern is data leakage from companyprovided smartphones. You are worried about employees unintentionally installing malicious apps that could access sensitive corporate data on their devices. Which of the following would be an effective measure to prevent such data leakage?","options":["Require biometric authentication for unlocking devices.","Regularly change Wi-Fi passwords used by the devices.","Mandate the use of VPNs when accessing corporate data.","Enforce a policy that only allows app installations from approved corporate app stores."],"answer":"D"},{"id":179,"section":"???","question":"As a junior security analyst for a small business, you are tasked with setting up the company's first wireless network. The company wants to ensure the network is secure from potential attacks. Given that the company's workforce is relatively small and the need for simplicity in managing network security, which of the following measures would you consider a priority to protect the network?","options":["Hide the network SSID","Enable WPA2 or WPA3 encryption on the wireless router","Implement a MAC address whitelist","Establish a regular schedule for changing the network password"],"answer":"B"},{"id":183,"section":"???","question":"During an ethical hacking engagement, you have been assigned to evaluate the security of a large organization's network. While examining the network traffic, you notice numerous incoming requests on various ports from different locations that show a pattern of an orchestrated attack. Based on your analysis, you deduce that the requests are likely to be automated scripts being run by unskilled hackers. What type of hacker classification does this scenario most likely represent?","options":["Script Kiddies trying to compromise the system using pre-made scripts.","Gray Hats testing system vulnerabilities to help vendors improve security.","White Hats conducting penetration testing to identify security weaknesses.","Black Hats trying to exploit system vulnerabilities for malicious intent."],"answer":"A"},{"id":187,"section":"???","question":"As the lead security engineer for a retail corporation, you are assessing the security of the wireless networks in the company's stores. One of your main concerns is the potential for \"Wardriving\" attacks, where attackers drive around with a Wi-Fi-enabled device to discover vulnerable wireless networks. Given the nature of the retail stores, you need to ensure that any security measures you implement do not interfere with customer experience, such as their ability to access in-store Wi-Fi. Taking into consideration these factors, which of the following would be the most suitable measure to mitigate the risk of Wardriving attacks?","options":["Limit the range of the store's wireless signals","Implement MAC address filtering","Disable SSID broadcasting","Implement WPA3 encryption for the store's Wi-Fi network"],"answer":"D"},{"id":189,"section":"???","question":"As part of a college project, you have set up a web server for hosting your team‵s application. Given your interest in cybersecurity, you have taken the lead in securing the server. You are aware that hackers often attempt to exploit server misconfigurations. Which of the following actions would best protect your web server from potential misconfiguration-based attacks?","options":["Regularly backing up server data","Enabling multi-factor authentication for users","Implementing a firewall to filter traffic","Performing regular server configuration audits"],"answer":"D"},{"id":204,"section":"???","question":"While working as an intern for a small business, you have been tasked with managing the company's web server. The server is being bombarded with requests, and the company's website is intermittently going offline. You suspect that this could be a Distributed Denial of Service (DDoS) attack. As an ethical hacker, which of the following steps would be your first course of action to mitigate the issue?","options":["Contact your Internet Service Provider (ISP) for assistance","Install a newer version of the server software","Implement IP address whitelisting","Increase the server's bandwidth"],"answer":"A"},{"id":213,"section":"???","question":"As the chief security officer at SecureMobile, you are overseeing the development of a mobile banking application. You are aware of the potential risks of man-in-the-middle (MitM) attacks where an attacker might intercept communication between the app and the bank's servers. Recently, you have learned a ication for app access."],"answer":"C"},{"id":240,"section":"???","question":"As an IT intern, you have been asked to help set up a secure Wi-Fi network for a local coffee shop. The owners want to provide free Wi-Fi to their customers, but they are concerned about potential security risks. They are looking for a simple yet effective solution that would not require a lot of technical knowledge to manage. Which of the following security measures would be the most suitable in this context?","options":["Disable the network's SSID broadcast","Enable MAC address filtering","Require customers to use VPN when connected to the Wi-Fi","Implement WPA2 or WPA3 encryption"],"answer":"D"},{"id":249,"section":"???","question":"Gregory, a professional penetration tester working at Sys Security Ltd., is tasked with performing a security test of web applications used in the company. For this purpose, Gregory uses a tool to test for any security loopholes by hijacking a session between a client and server. This tool has a feature of intercepting proxy that can be used to inspect and modify the traffic between the browser and target application. This tool can also perform customized attacks and can be used to test the randomness of session tokens.\nWhich of the following tools is used by Gregory in the above scenario?","options":["Wireshark","Nmap","Burp Suite","CxSAST"],"answer":"C"},{"id":253,"section":"???","question":"Security administrator John Smith has noticed abnormal amounts of traffic coming from local computers at night. Upon reviewing, he finds that user data have been exfiltrated by an attacker. AV tools are unable to find any malicious software, and the IDS/IPS has not reported on any non-whitelisted programs.\nWhat type of malware did the attacker use to bypass the company‵s application whitelisting?","options":["File-less malware","Zero-day malware","Phishing malware","Logic bomb malware"],"answer":"A"},{"id":255,"section":"???","question":"Scenario: Joe turns on his home computer to access personal online banking. When he enters the URL www.bank.com, the website is displayed, but it prompts him to re-enter his credentials as if he has never visited the site before. When he examines the website URL closer, he finds that the site is not secure and the web address appears different. What type of attack he is experiencing?","options":["DHCP spoofing","DoS attack","ARP cache poisoning","DNS hijacking"],"answer":"D"},{"id":259,"section":"???","question":"Which of the following commands checks for valid users on an SMTP server?","options":["RCPT","CHK","VRFY","EXPN"],"answer":"C"},{"id":260,"section":"???","question":"Bella, a security professional working at an IT firm, finds that a security breach has occurred while transferring important files. Sensitive data, employee usernames, and passwords are shared in plaintext, paving the way for hackers to perform successful session hijacking. To address this situation, Bella implemented a protocol that sends data using encryption and digital certificates.\nWhich of the following protocols is used by Bella?","options":["FTPS","FTP","HTTPS","IP"],"answer":"A"},{"id":261,"section":"???","question":"To hide the file on a Linux system, you have to start the filename with a specific character.\nWhat is the character?","options":["Tilde (~)","Underscore (_)","Period (.)","Exclamation mark (!)"],"answer":"C"},{"id":263,"section":"???","question":"Jacob works as a system administrator in an organization. He wants to extract the source code of a mobile application and disassemble the application to analyze its design flaws. Using this technique, he wants to fix any bugs in the application, discover underlying vulnerabilities, and improve defense strategies against attacks.\nWhat is the technique used by Jacob in the above scenario to improve the security of the mobile application?","options":["Reverse engineering","App sandboxing","Jailbreaking","Social engineering"],"answer":"A"},{"id":265,"section": tocol (SMTP) enumeration?","options":["A list of all mail proxy server addresses used by the targeted host.","The internal command RCPT provides a list of ports open to message traffic.","The two internal commands VRFY and EXPN provide a confirmation of valid users, email addresses, aliases, and mailing lists.","Reveals the daily outgoing message limits before mailboxes are locked."],"answer":"C"},{"id":282,"section":"???","question":"When considering how an attacker may exploit a web server, what is web server footprinting?","options":["When an attacker creates a complete profile of the site's external links and file structures","When an attacker uses a brute-force attack to crack a web-server password","When an attacker implements a vulnerability scanner to identity weaknesses","When an attacker gathers system-level data, including account details and server names"],"answer":"D"},{"id":285,"section":"???","question":"What would be the purpose of running \"wget 192.168.0.15 -q -S\" against a web server?","options":["Performing content enumeration on the web server to discover hidden folders","Using wget to perform banner grabbing on the webserver","Flooding the web server with requests to perform a DoS attack","Downloading all the contents of the web page locally for further examination"],"answer":"B"},{"id":286,"section":"???","question":"Harris is attempting to identify the OS running on his target machine. He inspected the initial TTL in the IP header and the related TCP window size and obtained the following results:\nTTL: 64 -\nWindow Size: 5840 -\nWhat the OS running on the target machine?","options":["Windows OS","Mac OS","Linux OS","Solaris OS"],"answer":"C"},{"id":295,"section":"???","question":"Widespread fraud at Enron, WorldCom, and Tyco led to the creation of a law that was designed to improve the accuracy and accountability of corporate disclosures. It covers accounting firms and third parties that provide financial services to some organizations and lowing:\nWhat type of attack is this?","options":["SQL injection","Buffer overflow","CSRF","XSS"],"answer":"B"},{"id":313,"section":"???","question":"John, a professional hacker, performs a network attack on a renowned organization and gains unauthorized access to the target network. He remains in the network without being detected for a long time and obtains sensitive information without sabotaging the organization. Which of the following attack techniques is used by John?","options":["Insider threat","Diversion theft","Spear-phishing sites","Advanced persistent threat"],"answer":"D"},{"id":316,"section":"???","question":"What are common files on a web server that can be misconfigured and provide useful information for a hacker such as verbose error messages?","options":["httpd.conf","administration.config","php.ini","idq.dll"],"answer":"C"},{"id":323,"section":"???","question":"Jane, an ethical hacker, is testing a target organization‵s web server and website to identify security loopholes. In this process, she copied the entire website and its content on a local drive to view the complete profile of the site‵s directory structure, file structure, external links, images, web pages, and so on. This information helps Jane map the website‵s directories and gain valuable information.\nWhat is the attack technique employed by Jane in the above scenario?","options":["Session hijacking","Website mirroring","Website defacement","Web cache poisoning"],"answer":"B"},{"id":326,"section":"???","question":"Becky has been hired by a client from Dubai to perform a penetration test against one of their remote offices. Working from her location in Columbus, Ohio, Becky runs her usual reconnaissance scans to obtain basic information about their network. When analyzing the results of her Whois search, Becky notices that the IP was allocated to a location in Le Havre, France.\nWhich regional Internet registry should Becky go to for detailed information?","options":["ARIN","LACNIC","APNIC","RIPE"],"answer":"D"},{"id":330,"section":"???","question":"Which of the following provides a security professional with most information about the system's security posture?","options":["Phishing, spamming, sending trojans","Social engineering, company site browsing tailgating","Wardriving, warchalking, social engineering","Port scanning, banner grabbing service identification"],"answer":"D"},{"id":331,"section":"???","question":"An Internet Service Provider (ISP) has a need to authenticate users connecting via analog modems, Digital Subscriber Lines (DSL), wireless data services, and Virtual Private Networks(VPN) over a Frame Relay network.\nWhich AAA protocol is the most likely able to handle this requirement?","options":["TACACS+","DIAMETER","Kerberos","RADIUS"],"answer":"D"},{"id":332,"section":"???","question":"Which of the following statements is FALSE with respect to Intrusion Detection Systems?","options":["Intrusion Detection Systems can be configured to distinguish specific content in network packets","Intrusion Detection Systems can easily distinguish a malicious payload in an encrypted traffic","Intrusion Detection Systems require constant update of the signature library","Intrusion Detection Systems can examine the contents of the data n context of the network protocol"],"answer":"B"}]; const letters=['A','B','C','D','E','F']; const LS_WRONG='ceh_v13_ios_wrong'; const LS_STATS='ceh_v13_ios_stats';

function explain(q,sel){let al=ansLetters(q), ok=sel&&al.includes(sel), chosen=sel?`${sel}. ${q.options[letters.indexOf(sel)]||''}`:'尚未選擇'; return `<h3>${sel?(ok?'答對了 ✅':'答錯了，來看詳解'):'答案與詳解'}</h3><p>你的選擇：<b>${esc(chosen)}</b></p><p class="ans">正確答案：${esc(ansText(q))}</p><div class="box"><b>繁中解析：</b><br>本題分類為「${esc(q.section)}」。正確答案最符合題目情境中的關鍵線索；作答時請先判斷題目是在問攻擊類型、工具用途、防禦方法、風險估算或標準流程，再回頭比對選項。</div><b>選項解析：</b><ol>${q.options.map((o,i)=>{let L=letters[i], good=al.includes(L);return `<li><b>${L}</b>：${esc(o)}<br><span class="muted">${good?'✅ 正確。此選項符合題目描述的核心行為或用途。':'非最佳答案。這類選項常是相近概念，但與題目線索不完全一致。'}</span></li>`}).join('')}</ol><b>考試記憶點：</b><ul>${tips(q).map(x=>`<li>${esc(x)}</li>`).join('')}</ul>`}

function filter(){let sec=$('sectionSelect').value, mode=$('modeSelect').value, kw=$('searchInput').value.trim().toLowerCase(); pool=QUESTIONS.filter(q=>{if(sec!='__all'&&q.section!==sec)return false; if(mode==='wrong'&&!wrongSet.has(q.id))return false; if(mode==='unseen'&&seenStats[q.id]?.seen)return false; if(kw){let k=kw.replace(/^#/,''); let blob=('#'+q.id+' '+q.id+' '+q.section+' '+q.question+' '+q.options.join(' ')).toLowerCase(); if(!blob.includes(k)&&!blob.includes(kw))return false} return true}); idx=0; render()}
function render(){answered=false; stat(); if(!pool.length){$('qmeta').innerHTML='';$('questionText').textContent='沒有符合條件的題目';$('options').innerHTML='';$('explainBox').className='explain'; return} let q=pool[idx]; $('qmeta').innerHTML=`<span class="pill">#${q.id}</span><span class="pill">${idx+1}/${pool.length}</span><span class="pill">${esc(q.section)}</span>${wrongSet.has(q.id)?'<span class="pill" style="border-color:#ef4444;color:#fecaca">常錯</span>':''}`; $('questionText').textContent=q.question; $('options').innerHTML=q.options.map((o,i)=>`<button class="opt" data-l="${letters[i]}"><b>${letters[i]}</b>${esc(o)}</button>`).join(''); document.querySelectorAll('.opt').forEach(b=>b.onclick=()=>choose(b.dataset.l)); $('explainBox').className='explain'; $('explainBox').innerHTML=''; $('toggleWrongBtn').textContent=wrongSet.has(q.id)?'移出常錯':'加入常錯'; window.scrollTo({top:0,behavior:'smooth'})}
function choose(L){if(!pool.length||answered)return; answered=true; let q=pool[idx], al=ansLetters(q), ok=al.includes(L); session.done++; if(ok)session.correct++; seenStats[q.id]={seen:true,lastOk:ok,t:Date.now()}; if(!ok)wrongSet.add(q.id); save(); document.querySelectorAll('.opt').forEach(b=>{let bl=b.dataset.l;if(al.includes(bl))b.classList.add('correct');else if(bl===L)b.classList.add('wrong');else b.classList.add('dim')}); $('explainBox').innerHTML=explain(q,L); $('explainBox').className='explain show'; stat(); wrongList(); toast(ok?'答對了':'已加入常錯題')}
function showAns(){if(!pool.length)return; let q=pool[idx]; document.querySelectorAll('.opt').forEach(b=>{ansLetters(q).includes(b.dataset.l)?b.classList.add('correct'):b.classList.add('dim')}); $('explainBox').innerHTML=explain(q,''); $('explainBox').className='explain show'}
function next(){if(pool.length){idx=(idx+1)%pool.length;render()}} function prev(){if(pool.length){idx=(idx-1+pool.length)%pool.length;render()}} function random(){if(pool.length){idx=Math.floor(Math.random()*pool.length);render()}}
function toggleWrong(){if(!pool.length)return; let id=pool[idx].id; wrongSet.has(id)?wrongSet.delete(id):wrongSet.add(id); save(); render(); wrongList(); toast(wrongSet.has(id)?'已加入常錯':'已移出常錯')}
function save(){localStorage.setItem(LS_WRONG,JSON.stringify([...wrongSet]));localStorage.setItem(LS_STATS,JSON.stringify(seenStats))} function stat(){$('totalCount').textContent=pool.length;$('doneCount').textContent=session.done;$('correctCount').textContent=session.correct;$('wrongCount').textContent=wrongSet.size;$('bar').style.width=pool.length?Math.min(100,session.done/pool.length*100)+'%':'0%'}
function wrongList(){let arr=QUESTIONS.filter(q=>wrongSet.has(q.id)); $('wrongList').innerHTML=arr.length?arr.map(q=>`<div class="wrongItem" data-id="${q.id}"><b>#${q.id}</b> <span class="muted">${esc(q.section)}</span><br>${esc(q.question.slice(0,90))}${q.question.length>90?'…':''}</div>`).join(''):'<p class="muted">目前沒有常錯題；答錯會自動加入，也可手動加入。</p>'; document.querySelectorAll('.wrongItem').forEach(el=>el.onclick=()=>{$('searchInput').value='#'+el.dataset.id;$('modeSelect').value='all';$('sectionSelect').value='__all';filter()})}
$('startBtn').onclick=filter;$('nextBtn').onclick=next;$('prevBtn').onclick=prev;$('randomBtn').onclick=random;$('showBtn').onclick=showAns;$('quickAnsBtn').onclick=showAns;$('toggleWrongBtn').onclick=toggleWrong;$('clearWrongBtn').onclick=()=>{if(confirm('確定清空常錯題？')){wrongSet.clear();save();render();wrongList()}};$('moreBtn').onclick=()=>$('moreModal').classList.add('show');$('closeMoreBtn').onclick=()=>$('moreModal').classList.remove('show');$('moreModal').onclick=e=>{if(e.target.id==='moreModal')$('moreModal').classList.remove('show')};
$('exportBtn').onclick=async()=>{let data=btoa(unescape(encodeURIComponent(JSON.stringify({wrong:[...wrongSet],stats:seenStats,version:1,t:Date.now()}))));$('syncBox').value=data;try{await navigator.clipboard.writeText(data);toast('已複製匯出代碼')}catch(e){toast('代碼已產生')}};
$('importBtn').onclick=()=>{try{let obj=JSON.parse(decodeURIComponent(escape(atob($('syncBox').value.trim())))); wrongSet=new Set(obj.wrong||[]); seenStats=obj.stats||{}; save(); filter(); wrongList(); toast('匯入成功')}catch(e){alert('匯入失敗，請確認代碼是否完整')}};
$('resetAllBtn').onclick=()=>{if(confirm('確定清除所有紀錄？')){wrongSet.clear();seenStats={};save();session={done:0,correct:0};filter();wrongList();toast('已清除')}};
document.addEventListener('keydown',e=>{let k=e.key.toUpperCase(); if(['A','B','C','D','E','F'].includes(k))choose(k); if(k==='N')next(); if(k==='R')random()}); if(window.navigator.standalone)$('iosMode').textContent='主畫面模式'; populate(); filter(); wrongList();
</script>
</body></html>
